<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Broadcast Message - Owner Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex flex-col select-none overflow-x-hidden p-4 sm:p-6">

    <div class="w-full max-w-2xl mx-auto bg-[#14151f] border border-zinc-800 rounded-2xl shadow-2xl p-5 sm:p-6 space-y-6">
        
        <div class="flex items-center justify-between border-b border-zinc-800 pb-4">
            <div class="flex items-center gap-3">
                <a href="/owner/dashboard" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-base font-black text-white tracking-wide uppercase">BROADCAST SYSTEM</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">Kirim Pesan Pengumuman Ke Halaman Awal User</p>
                </div>
            </div>
            <i class="fa-solid fa-bullhorn text-red-500 text-xl drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]"></i>
        </div>

        <div id="lockWarning" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl p-4 flex items-start gap-3 text-left">
            <i class="fa-solid fa-lock text-red-500 mt-0.5 shadow-[0_0_10px_rgba(239,68,68,0.3)]"></i>
            <div>
                <h4 class="text-xs font-black text-white uppercase tracking-wide">SISTEM BROADCAST TERKUNCI</h4>
                <p class="text-[11px] text-zinc-400 font-medium mt-0.5">Pesan broadcast sebelumnya sedang aktif di halaman user. Kamu tidak bisa membuat pesan baru sebelum mengubah status di bawah menjadi NONAKTIF.</p>
            </div>
        </div>

        <form id="broadcastForm" class="space-y-5">
            
            <div class="space-y-2">
                <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">JUDUL PENGUMUMAN :</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-zinc-600">
                        <i class="fa-solid fa-heading text-xs"></i>
                    </span>
                    <input type="text" id="bcTitle" placeholder="CONTOH: MAINTENANCE SYSTEM / EVENT PROMO" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/50 rounded-xl pl-11 pr-4 py-3.5 text-sm font-bold text-white placeholder-zinc-600 outline-none transition uppercase disabled:cursor-not-allowed disabled:bg-zinc-950/60 disabled:text-zinc-500" required>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">ISI PESAN BROADCAST :</label>
                <textarea id="bcMessage" rows="5" placeholder="TULISKAN ISI PESAN ATAU INFORMASI YANG INGIN DITAMPILKAN DI HALAMAN UTAMA USER..." class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/50 rounded-xl p-4 text-sm font-bold text-white placeholder-zinc-600 outline-none transition resize-none disabled:cursor-not-allowed disabled:bg-zinc-950/60 disabled:text-zinc-500" required></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">TIPE NOTIFIKASI :</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-zinc-600">
                            <i class="fa-solid fa-circle-info text-xs"></i>
                        </span>
                        <select id="bcType" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/50 rounded-xl pl-11 pr-4 py-3.5 text-sm font-bold text-white outline-none transition appearance-none cursor-pointer uppercase disabled:cursor-not-allowed disabled:bg-zinc-950/60 disabled:text-zinc-500">
                            <option value="info">INFO UTAMA (BIRU)</option>
                            <option value="warning">PERINGATAN (KUNING)</option>
                            <option value="danger">PENTING / DARURAT (MERAH)</option>
                            <option value="success">PROMO / SUKSES (HIJAU)</option>
                        </select>
                        <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-zinc-500 pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </span>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">STATUS TAMPILAN :</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-zinc-600">
                            <i class="fa-solid fa-eye text-xs"></i>
                        </span>
                        <select id="bcStatus" onchange="handleStatusChange()" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/50 rounded-xl pl-11 pr-4 py-3.5 text-sm font-bold text-white outline-none transition appearance-none cursor-pointer uppercase">
                            <option value="aktif">AKTIFKAN (LANGSUNG TAMPIL)</option>
                            <option value="nonaktif">NONAKTIFKAN (SEMBUNYIKAN)</option>
                        </select>
                        <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-zinc-500 pointer-events-none">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </span>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black text-xs tracking-widest rounded-xl transition uppercase shadow-xl shadow-red-600/10 active:scale-[0.99] flex justify-center items-center gap-2 disabled:bg-zinc-800 disabled:text-zinc-500 disabled:border disabled:border-zinc-700/50 disabled:shadow-none disabled:cursor-not-allowed">
                <i class="fa-solid fa-paper-plane"></i> <span id="btnText">BROADCAST SEKARANG</span>
            </button>

        </form>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user-session')
                .then(res => res.json())
                .then(session => {
                    if (!session.valid || session.user.role !== 'owner') {
                        window.location.href = '/login';
                    } else {
                        fetchCurrentBroadcast();
                    }
                }).catch(() => { window.location.href = '/login'; });
        });

        function fetchCurrentBroadcast() {
            fetch('/api/owner/broadcast')
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.data) {
                        document.getElementById('bcTitle').value = res.data.title || '';
                        document.getElementById('bcMessage').value = res.data.message || '';
                        document.getElementById('bcType').value = res.data.type || 'info';
                        document.getElementById('bcStatus').value = res.data.status || 'aktif';
                        
                        lockFieldsIfNeeded(res.data.status);
                    }
                }).catch(() => {});
        }

        function lockFieldsIfNeeded(status) {
            const isAktif = (status === 'aktif');
            document.getElementById('bcTitle').disabled = isAktif;
            document.getElementById('bcMessage').disabled = isAktif;
            document.getElementById('bcType').disabled = isAktif;
            
            const btnSubmit = document.getElementById('btnSubmit');
            const warningBox = document.getElementById('lockWarning');
            const btnText = document.getElementById('btnText');

            if (isAktif) {
                warningBox.classList.remove('hidden');
                btnSubmit.disabled = true;
                btnText.innerText = "SISTEM TERKUNCI";
            } else {
                warningBox.classList.add('hidden');
                btnSubmit.disabled = false;
                btnText.innerText = "BROADCAST SEKARANG";
            }
        }

        function handleStatusChange() {
            const statusVal = document.getElementById('bcStatus').value;
            if (statusVal === 'nonaktif') {
                document.getElementById('bcTitle').disabled = false;
                document.getElementById('bcMessage').disabled = false;
                document.getElementById('bcType').disabled = false;
                document.getElementById('btnSubmit').disabled = false;
                document.getElementById('btnText').innerText = "SIMPAN PERUBAHAN STATUS";
                document.getElementById('lockWarning').classList.add('hidden');
            } else {
                fetchCurrentBroadcast();
            }
        }

        document.getElementById('broadcastForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const payload = {
                title: document.getElementById('bcTitle').value,
                message: document.getElementById('bcMessage').value,
                type: document.getElementById('bcType').value,
                status: document.getElementById('bcStatus').value
            };

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>MEMPROSES PESAN...</span>`;

            fetch('/api/owner/broadcast/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    alert('Sistem broadcast diperbarui!');
                    fetchCurrentBroadcast();
                } else {
                    alert('Gagal: ' + res.message);
                    fetchCurrentBroadcast();
                }
            })
            .catch(() => alert('Terjadi gangguan jaringan.'))
            .finally(() => {
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>
</html>
