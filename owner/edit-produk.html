<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Produk - Owner Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex flex-col select-none overflow-x-hidden p-4 sm:p-6">

    <div class="w-full max-w-2xl mx-auto bg-[#14151f] border border-zinc-800 rounded-2xl shadow-2xl p-5 sm:p-6 space-y-6">
        
        <div class="flex items-center justify-between border-b border-zinc-800 pb-4">
            <div class="flex items-center gap-3">
                <a href="/owner/list-produk.html" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-base font-black text-white tracking-wide uppercase">EDIT PRODUCT DATA</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">Console System Update - Hak Akses Owner</p>
                </div>
            </div>
            <i class="fa-solid fa-crown text-red-500 text-xl drop-shadow-[0_0_8px_rgba(239,68,68,0.5)]"></i>
        </div>

        <form id="productForm" class="space-y-5">
            
            <div class="space-y-2">
                <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">KATEGORI UTAMA :</label>
                <input type="text" id="displayCategory" class="w-full bg-zinc-900 text-zinc-400 border border-zinc-800 rounded-xl px-4 py-3 text-sm font-bold outline-none cursor-not-allowed uppercase" readonly>
                <input type="hidden" id="selectedCategory">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">NAMA PRODUK INDUK :</label>
                    <input type="text" id="parentName" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/50 rounded-xl px-4 py-3 text-sm font-bold text-white placeholder-zinc-600 outline-none transition" required>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">ID PRODUK :</label>
                    <input type="text" id="productId" class="w-full bg-zinc-900 text-zinc-500 border border-zinc-800 rounded-xl px-4 py-3 text-sm font-mono font-bold outline-none cursor-not-allowed" readonly>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest block">FOTO PRODUK :</label>
                <div class="flex items-center gap-3">
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="uploadToImgBB(this)">
                    <button type="button" onclick="document.getElementById('fileInput').click()" class="px-5 py-3 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 rounded-xl font-bold text-xs text-zinc-300 transition flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up text-red-500"></i> Ganti Foto
                    </button>
                    <div id="uploadStatus" class="text-[11px] font-bold text-emerald-400 uppercase tracking-wider">Foto Terpasang</div>
                </div>
                <input type="hidden" id="productImageUrl" required>
            </div>

            <div id="dynamicInputsContainer" class="space-y-4"></div>

            <button type="submit" id="btnSubmit" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black text-xs tracking-widest rounded-xl transition uppercase shadow-xl shadow-red-600/10 active:scale-[0.99] flex justify-center items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> <span>SIMPAN PERUBAHAN DATA</span>
            </button>

        </form>
    </div>

    <script>
        const IMGBB_KEY = '37e84e2162972cbe655f784aff8b9218';
        const urlParams = new URLSearchParams(window.location.search);
        const targetProductId = urlParams.get('id');

        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user-session')
                .then(res => res.json())
                .then(session => {
                    if (!session.valid || session.user.role !== 'owner') {
                        window.location.href = '/login';
                    } else if (!targetProductId) {
                        window.location.href = '/owner/list-produk.html';
                    } else {
                        fetchExistingProduct();
                    }
                }).catch(() => { window.location.href = '/login'; });
        });

        function fetchExistingProduct() {
            fetch('/api/products')
                .then(res => res.json())
                .then(response => {
                    if (response.success && response.data) {
                        const product = response.data.find(p => (String(p.productId) === String(targetProductId) || String(p.id) === String(targetProductId)));
                        if (product) {
                            populateForm(product);
                        } else {
                            alert('Produk tidak ditemukan!');
                            window.location.href = '/owner/list-produk.html';
                        }
                    }
                });
        }

        function populateForm(product) {
            document.getElementById('productId').value = product.productId || product.id;
            document.getElementById('parentName').value = product.productName;
            document.getElementById('displayCategory').value = product.category;
            document.getElementById('selectedCategory').value = product.category;
            document.getElementById('productImageUrl').value = product.imageUrl || product.image || '';

            const container = document.getElementById('dynamicInputsContainer');
            container.innerHTML = '';

            const category = product.category;
            const items = product.items || [];

            items.forEach((item, index) => {
                const i = index + 1;
                const itemBox = document.createElement('div');
                itemBox.className = "p-4 bg-zinc-900/40 border border-zinc-800/80 rounded-xl space-y-3 relative";

                let specificFields = '';

                if (category === 'AKUN PREMIUM') {
                    specificFields = `
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">EMAIL :</label><input type="email" name="email_${i}" value="${item.email || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">PASSWORD :</label><input type="text" name="pw_${i}" value="${item.pw || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">HARGA :</label><input type="number" name="harga_${i}" value="${item.harga || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">STOK :</label><input type="number" name="stok_${i}" value="${item.stok || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        </div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI :</label><textarea name="deskripsi_${i}" rows="2" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required>${item.deskripsi || ''}</textarea></div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI TAMBAHAN (OPSIONAL) :</label><input type="text" name="deskripsi_ext_${i}" value="${item.deskripsiExt || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none"></div>
                    `;
                } else if (category === 'APLIKASI STREAMING') {
                    specificFields = `
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">HARGA :</label><input type="number" name="harga_${i}" value="${item.harga || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">STOK :</label><input type="number" name="stok_${i}" value="${item.stok || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        </div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">LINK APK :</label><input type="url" name="link_apk_${i}" value="${item.linkApk || ''}" placeholder="https://" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI :</label><textarea name="deskripsi_${i}" rows="2" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required>${item.deskripsi || ''}</textarea></div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI TAMBAHAN (OPSIONAL) :</label><input type="text" name="deskripsi_ext_${i}" value="${item.deskripsiExt || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none"></div>
                    `;
                } else if (category === 'AKUN GAME') {
                    specificFields = `
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">EMAIL GAME / ID :</label><input type="text" name="email_${i}" value="${item.email || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                            <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">PW GAME :</label><input type="text" name="pw_${i}" value="${item.pw || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="grid grid-cols-1 col-span-2 gap-3">
                                <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">HARGA :</label><input type="number" name="harga_${i}" value="${item.harga || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                            </div>
                            <div class="space-y-1 text-left"><label class="text-[10px] text-zinc-500 font-bold">STOK :</label><input type="number" name="stok_${i}" value="${item.stok || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        </div>
                        <div class="space-y-1 text-left">
                            <label class="text-[10px] text-zinc-500 font-bold">A2F AUTHENTICATOR :</label>
                            <select name="a2f_${i}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none">
                                <option value="OFF" ${item.a2f === 'OFF' ? 'selected' : ''}>OFF</option>
                                <option value="ON" ${item.a2f === 'ON' ? 'selected' : ''}>ON</option>
                            </select>
                        </div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI UTAMA :</label><textarea name="deskripsi_${i}" rows="2" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required>${item.deskripsi || ''}</textarea></div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI TAMBAHAN (OPSIONAL) :</label><input type="text" name="deskripsi_ext_${i}" value="${item.deskripsiExt || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none"></div>
                    `;
                } else if (category === 'LAIN NYA') {
                    specificFields = `
                        <div class="grid grid-cols-3 gap-3">
                            <div class="grid grid-cols-1 col-span-2 gap-3">
                                <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">HARGA PRODUK :</label><input type="number" name="harga_${i}" value="${item.harga || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                            </div>
                            <div class="space-y-1 text-left"><label class="text-[10px] text-zinc-500 font-bold">STOK :</label><input type="number" name="stok_${i}" value="${item.stok || 0}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        </div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">URL / LINK PRODUK :</label><input type="url" name="url_produk_${i}" value="${item.urlProduk || ''}" placeholder="https://" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required></div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI :</label><textarea name="deskripsi_${i}" rows="2" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required>${item.deskripsi || ''}</textarea></div>
                        <div class="space-y-1"><label class="text-[10px] text-zinc-500 font-bold">DESKRIPSI TAMBAHAN (OPSIONAL) :</label><input type="text" name="deskripsi_ext_${i}" value="${item.deskripsiExt || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none"></div>
                    `;
                }

                itemBox.innerHTML = `
                    <div class="text-[10px] font-black text-red-500 bg-red-500/10 px-2 py-1 rounded-md inline-block uppercase tracking-wider mb-2">DATA SUB-PRODUK VARIANT ${i}</div>
                    <div class="space-y-1 mb-2">
                        <label class="text-[10px] text-zinc-400 font-bold">NAMA SUB-PRODUK VARIANT :</label>
                        <input type="text" name="sub_name_${i}" value="${item.subName || ''}" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-2.5 text-xs font-bold text-white outline-none" required>
                    </div>
                    ${specificFields}
                `;
                container.appendChild(itemBox);
            });
            
            window.loadedItemsCount = items.length;
        }

        function uploadToImgBB(input) {
            const file = input.files[0];
            if (!file) return;
            const status = document.getElementById('uploadStatus');
            status.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-amber-500 mr-1"></i> MENGUPLOAD...';
            
            const formData = new FormData();
            formData.append('image', file);

            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    let directUrl = res.data.display_url;
                    if (directUrl.includes('i.ibb.co/')) {
                        directUrl = directUrl.replace('i.ibb.co/', 'i.ibb.co.com/');
                    }
                    document.getElementById('productImageUrl').value = directUrl;
                    status.className = "text-[11px] font-bold text-emerald-400 uppercase tracking-wider";
                    status.innerHTML = '<i class="fa-solid fa-circle-check mr-1"></i> TER-UPLOAD';
                } else {
                    status.className = "text-[11px] font-bold text-red-500 uppercase tracking-wider";
                    status.innerHTML = '<i class="fa-solid fa-circle-xmark mr-1"></i> GAGAL UPLOAD';
                }
            })
            .catch(() => {
                status.className = "text-[11px] font-bold text-red-500 uppercase tracking-wider";
                status.innerHTML = '<i class="fa-solid fa-circle-xmark mr-1"></i> ERROR NET';
            });
        }

        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const category = document.getElementById('selectedCategory').value;
            const parentName = document.getElementById('parentName').value;
            const imageUrl = document.getElementById('productImageUrl').value;
            const idProduct = document.getElementById('productId').value;
            const btnSubmit = document.getElementById('btnSubmit');

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>MENYIMPAN DATA...</span>`;

            let subProductsList = [];
            const totalData = window.loadedItemsCount || 1;

            for (let i = 1; i <= totalData; i++) {
                let baseData = {
                    subName: document.getElementsByName(`sub_name_${i}`)[0].value,
                    harga: parseInt(document.getElementsByName(`harga_${i}`)[0]?.value || 0),
                    stok: parseInt(document.getElementsByName(`stok_${i}`)[0]?.value || 0),
                    deskripsi: document.getElementsByName(`deskripsi_${i}`)[0]?.value || '',
                    deskripsiExt: document.getElementsByName(`deskripsi_ext_${i}`)[0]?.value || ''
                };

                let rawDataRahasia = "";

                if (category === 'AKUN PREMIUM') {
                    const em = document.getElementsByName(`email_${i}`)[0].value;
                    const pw = document.getElementsByName(`pw_${i}`)[0].value;
                    baseData.email = em;
                    baseData.pw = pw;
                    rawDataRahasia = `Email: ${em} | Password: ${pw}`;
                } else if (category === 'APLIKASI STREAMING') {
                    const link = document.getElementsByName(`link_apk_${i}`)[0].value;
                    baseData.linkApk = link;
                    rawDataRahasia = `Link APK: ${link}`;
                } else if (category === 'AKUN GAME') {
                    const em = document.getElementsByName(`email_${i}`)[0].value;
                    const pw = document.getElementsByName(`pw_${i}`)[0].value;
                    baseData.email = em;
                    baseData.pw = pw;
                    baseData.a2f = document.getElementsByName(`a2f_${i}`)[0].value;
                    rawDataRahasia = `ID/Email: ${em} | Password: ${pw} | Auth: ${baseData.a2f}`;
                } else if (category === 'LAIN NYA') {
                    const url = document.getElementsByName(`url_produk_${i}`)[0].value;
                    baseData.urlProduk = url;
                    rawDataRahasia = `URL Produk: ${url}`;
                }

                baseData.dataRahasia = rawDataRahasia;
                subProductsList.push(baseData);
            }

            const finalPayload = {
                name: parentName,
                category: category,
                imageUrl: imageUrl,
                price: subProductsList[0] ? subProductsList[0].harga : 0,
                deskripsi: subProductsList[0] ? subProductsList[0].deskripsi : '',
                deskripsiExt: subProductsList[0] ? subProductsList[0].deskripsiExt : '',
                items: subProductsList
            };

            fetch(`/api/owner/product/update/${idProduct}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalPayload)
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    alert('Sukses memperbarui data produk owner!');
                    window.location.href = '/owner/list-produk.html'; 
                } else {
                    alert('Gagal simpan: ' + res.message);
                }
            })
            .catch(() => alert('Terjadi gangguan jaringan.'))
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>SIMPAN PERUBAHAN DATA</span>`;
            });
        });
    </script>
</body>
</html>
