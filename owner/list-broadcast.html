<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>List & Manage Broadcast - Owner Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex flex-col select-none overflow-x-hidden p-4 sm:p-6">

    <div class="w-full max-w-3xl mx-auto bg-[#14151f] border border-zinc-800 rounded-2xl shadow-2xl p-5 sm:p-6 space-y-6">
        
        <div class="flex items-center justify-between border-b border-zinc-800 pb-4">
            <div class="flex items-center gap-3">
                <a href="/owner/dashboard" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-base font-black text-white tracking-wide uppercase">LIST MANAGEMENT BROADCAST</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">Pantau, Ubah Status, atau Hapus Broadcast yang berjalan</p>
                </div>
            </div>
            <i class="fa-solid fa-rectangle-list text-orange-500 text-xl drop-shadow-[0_0_8px_rgba(249,115,22,0.4)]"></i>
        </div>

        <div class="bg-[#0f1015] border border-zinc-800/80 rounded-xl overflow-hidden shadow-xl">
            <div class="p-4 bg-[#161722]/50 border-b border-zinc-900 flex justify-between items-center">
                <span class="text-[10px] font-black text-zinc-400 uppercase tracking-wider">Sistem Komunikasi Realtime</span>
                <span id="syncStatus" class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded font-bold uppercase tracking-widest">Connected</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-zinc-900 text-[10px] font-black text-zinc-500 uppercase tracking-wider bg-[#11121a]/40">
                            <th class="p-4">KONTEN BROADCAST</th>
                            <th class="p-4 text-center">TIPE</th>
                            <th class="p-4 text-center">STATUS</th>
                            <th class="p-4 text-center">AKSI KONTROL</th>
                        </tr>
                    </thead>
                    <tbody id="broadcastListTable">
                        <tr>
                            <td colspan="4" class="p-10 text-center text-xs text-zinc-600 font-bold uppercase tracking-wide">
                                <i class="fa-solid fa-spinner fa-spin mr-2"></i>Memuat Data Berkas...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user-session')
                .then(res => res.json())
                .then(session => {
                    if (!session.valid || session.user.role !== 'owner') {
                        window.location.href = '/login';
                    } else {
                        getBroadcastList();
                    }
                }).catch(() => { window.location.href = '/login'; });
        });

        function getBroadcastList() {
            fetch('/api/owner/broadcast')
                .then(res => res.json())
                .then(res => {
                    const tbody = document.getElementById('broadcastListTable');
                    
                    if (res.success && res.data && res.data.title) {
                        const item = res.data;
                        const currentStatus = (item.status || 'nonaktif').toLowerCase().trim();
                        const currentType = (item.type || 'info').toLowerCase().trim();
                        
                        let typeBadge = `<span class="px-2 py-0.5 text-[9px] font-black rounded border bg-blue-500/10 text-blue-400 border-blue-500/20 uppercase">INFO</span>`;
                        if (currentType === 'warning') typeBadge = `<span class="px-2 py-0.5 text-[9px] font-black rounded border bg-amber-500/10 text-amber-400 border-amber-500/20 uppercase">WARN</span>`;
                        if (currentType === 'danger') typeBadge = `<span class="px-2 py-0.5 text-[9px] font-black rounded border bg-red-500/10 text-red-400 border-red-500/20 uppercase">ALERT</span>`;
                        if (currentType === 'success') typeBadge = `<span class="px-2 py-0.5 text-[9px] font-black rounded border bg-emerald-500/10 text-emerald-400 border-emerald-500/20 uppercase">PROMO</span>`;

                        let statusBadge = '';
                        let toggleButton = '';

                        if (currentStatus === 'aktif') {
                            statusBadge = `<span class="px-2 py-0.5 text-[9px] font-black rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 uppercase tracking-wider animate-pulse">AKTIF</span>`;
                            toggleButton = `
                                <button onclick="toggleBroadcastStatus('nonaktif')" class="px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white text-[10px] font-black rounded-lg transition uppercase tracking-wide active:scale-95 shadow-md shadow-red-600/10">
                                    <i class="fa-solid fa-power-off mr-1"></i> Matikan
                                </button>
                            `;
                        } else {
                            statusBadge = `<span class="px-2 py-0.5 text-[9px] font-black rounded bg-zinc-800 text-zinc-500 border border-zinc-700/50 uppercase tracking-wider">OFFLINE</span>`;
                            toggleButton = `
                                <button onclick="toggleBroadcastStatus('aktif')" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-black rounded-lg transition uppercase tracking-wide active:scale-95 shadow-md shadow-emerald-600/10">
                                    <i class="fa-solid fa-circle-check mr-1"></i> Aktifkan
                                </button>
                            `;
                        }

                        tbody.innerHTML = `
                            <tr class="border-b border-zinc-900 hover:bg-zinc-900/20 transition">
                                <td class="p-4 max-w-xs sm:max-w-md">
                                    <div class="text-xs font-bold text-white uppercase tracking-wide truncate">${item.title}</div>
                                    <div class="text-[11px] text-zinc-500 font-medium mt-1 line-clamp-2 leading-relaxed whitespace-pre-wrap">${item.message}</div>
                                    <div class="text-[9px] text-zinc-600 font-mono mt-2 uppercase">Update: ${item.updatedAt ? new Date(item.updatedAt).toLocaleString('id-ID') : '-'}</div>
                                </td>
                                <td class="p-4 text-center">${typeBadge}</td>
                                <td class="p-4 text-center">${statusBadge}</td>
                                <td class="p-4 text-center">
                                    <div class="flex items-center justify-center gap-2">
                                        ${toggleButton}
                                        <button onclick="deleteBroadcastContent()" class="w-8 h-8 bg-zinc-900 border border-zinc-800 hover:border-red-500/40 hover:text-red-400 rounded-lg text-zinc-500 flex items-center justify-center transition text-xs active:scale-95" title="Kosongkan Teks">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    } else {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="4" class="p-10 text-center text-xs text-zinc-500 font-bold uppercase tracking-wide">
                                    Belum ada data pesan broadcast terkonfigurasi.
                                </td>
                            </tr>
                        `;
                    }
                })
                .catch(() => {
                    document.getElementById('broadcastListTable').innerHTML = `
                        <tr>
                            <td colspan="4" class="p-10 text-center text-xs text-red-400 font-bold uppercase tracking-wide">
                                Gagal mengambil data dari server.
                            </td>
                        </tr>
                    `;
                });
        }

        function toggleBroadcastStatus(targetStatus) {
            const sync = document.getElementById('syncStatus');
            sync.innerText = "PROCESSING...";
            sync.className = "text-[9px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded font-bold uppercase tracking-widest";

            fetch('/api/owner/broadcast')
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.data) {
                        const payload = {
                            title: res.data.title,
                            message: res.data.message,
                            type: res.data.type,
                            status: targetStatus
                        };

                        return fetch('/api/owner/broadcast/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }
                })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        getBroadcastList();
                    } else {
                        alert('Gagal: ' + res.message);
                    }
                })
                .catch(() => alert('Gangguan koneksi jaringan.'))
                .finally(() => {
                    sync.innerText = "CONNECTED";
                    sync.className = "text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded font-bold uppercase tracking-widest";
                });
        }

        function deleteBroadcastContent() {
            if (!confirm('Apakah kamu yakin ingin mengosongkan teks pengumuman ini?')) return;
            
            fetch('/api/owner/broadcast/delete', { method: 'POST' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        alert('Teks broadcast berhasil dibersihkan!');
                        getBroadcastList();
                    } else {
                        alert('Gagal menghapus: ' + res.message);
                    }
                }).catch(() => alert('Gangguan server atau endpoint delete belum siap.'));
        }
    </script>
</body>
</html>
