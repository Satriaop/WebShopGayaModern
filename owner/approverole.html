<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owner - Approval Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex items-center justify-center p-4 sm:p-6 select-none overflow-x-hidden">

    <div class="w-full max-w-xl flex flex-col gap-4">
        
        <div class="flex justify-between items-center px-2">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-[10px] text-zinc-500 font-extrabold tracking-widest uppercase font-mono">Console Approval System</span>
            </div>
            <a href="/owner/dashboard" class="text-[10px] bg-zinc-900/80 hover:bg-zinc-800 text-zinc-400 font-black px-3 py-1.5 rounded-xl border border-zinc-800 transition flex items-center gap-1.5 active:scale-95">
                <i class="fa-solid fa-arrow-left text-[9px]"></i>
                <span>KEMBALI KEDASHBOARD</span>
            </a>
        </div>

        <div class="bg-[#14151f] border border-zinc-800/80 p-6 rounded-2xl shadow-2xl space-y-5 w-full relative overflow-hidden">
            
            <div class="flex items-center justify-between border-b border-zinc-900 pb-4">
                <div class="flex items-center space-x-3">
                    <div class="w-9 h-9 rounded-xl bg-[#0f1015] flex items-center justify-center border border-zinc-800/80 text-red-500 shadow-inner">
                        <i class="fa-solid fa-user-shield text-xs"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-black text-xs uppercase tracking-wider">Persetujuan Pengajuan</h4>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-tight mt-0.5">Owner Panel Akses</p>
                    </div>
                </div>
                <span id="countRequest" class="text-[10px] text-red-400 font-black bg-red-500/10 px-2.5 py-1 rounded-lg border border-red-500/10 uppercase tracking-wide font-mono">0 Antrean</span>
            </div>

            <div id="loadingState" class="py-16 text-center space-y-2.5">
                <i class="fa-solid fa-circle-notch animate-spin text-red-500 text-xl"></i>
                <p class="text-zinc-500 text-[10px] font-black uppercase tracking-widest font-mono">Memuat database pengajuan...</p>
            </div>

            <div id="emptyState" class="hidden py-16 text-center space-y-3">
                <div class="w-12 h-12 rounded-full bg-zinc-900/50 border border-zinc-800/60 flex items-center justify-center mx-auto text-zinc-600">
                    <i class="fa-solid fa-circle-check text-lg"></i>
                </div>
                <p class="text-zinc-500 text-[10px] font-black uppercase tracking-widest font-mono">Antrean bersih / tidak ada pengajuan</p>
            </div>

            <div id="listRequests" class="hidden space-y-4 max-h-[420px] overflow-y-auto pr-1"></div>
        </div>
        
    </div>

    <script>
        function loadRequests() {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const listRequests = document.getElementById('listRequests');
            const countRequest = document.getElementById('countRequest');

            loadingState.classList.remove('hidden');
            emptyState.classList.add('hidden');
            listRequests.classList.add('hidden');

            fetch('/api/owner/request-role/list')
                .then(res => res.json())
                .then(res => {
                    loadingState.classList.add('hidden');
                    if (res.success && res.data && res.data.length > 0) {
                        const pendingRequests = res.data.filter(r => (r.status || '').toUpperCase() === 'PENDING');
                        
                        countRequest.innerText = `${pendingRequests.length} Antrean`;
                        
                        if (pendingRequests.length > 0) {
                            listRequests.classList.remove('hidden');
                            listRequests.innerHTML = pendingRequests.map(req => `
                                <div class="bg-[#0f1015] border border-zinc-800/50 p-4 rounded-xl flex flex-col gap-3 hover:border-zinc-800 transition duration-300">
                                    <div class="flex justify-between items-start">
                                        <div class="flex flex-col text-left">
                                            <span class="text-white font-black text-xs uppercase tracking-wide">USER: ${req.username}</span>
                                            <span class="text-[10px] font-extrabold mt-0.5 uppercase text-red-500 font-mono tracking-wider">REQ ROLE: ${req.roleRequested || 'ADMIN'}</span>
                                            <span class="text-[9px] text-zinc-500 font-bold mt-1 font-mono">${req.date || '-'}</span>
                                        </div>
                                        <span class="text-[9px] bg-orange-500/10 text-orange-400 border border-orange-500/10 px-2 py-0.5 rounded font-black tracking-widest uppercase animate-pulse font-mono">PENDING</span>
                                    </div>
                                    <div class="bg-[#14151f] border border-zinc-900/80 px-3 py-2.5 rounded-xl text-left shadow-inner">
                                        <p class="text-[10px] text-zinc-400 font-bold leading-relaxed break-words select-text">${req.alasan || '-'}</p>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2 mt-1">
                                        <button onclick="processAction('${req.id}', 'REJECTED')" class="py-2.5 bg-red-500/5 hover:bg-red-500/10 text-red-400 border border-red-500/10 rounded-xl text-[10px] font-black uppercase tracking-widest transition active:scale-95 font-mono">
                                            <i class="fa-solid fa-user-xmark mr-1"></i> TOLAK REQ
                                        </button>
                                        <button onclick="processAction('${req.id}', 'SUCCESS')" class="py-2.5 bg-emerald-500/5 hover:bg-emerald-500/10 text-emerald-400 border border-emerald-500/10 rounded-xl text-[10px] font-black uppercase tracking-widest transition active:scale-95 font-mono">
                                            <i class="fa-solid fa-user-check mr-1"></i> TERIMA REQ
                                        </button>
                                    </div>
                                </div>
                            `).join('');
                        } else {
                            emptyState.classList.remove('hidden');
                        }
                    } else {
                        countRequest.innerText = '0 Antrean';
                        emptyState.classList.remove('hidden');
                    }
                })
                .catch(() => {
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                });
        }

        function processAction(id, status) {
            if(!confirm(`Konfirmasi aksis sistem owner untuk merubah status menjadi ${status}?`)) return;

            fetch('/api/owner/request-role/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, status })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    loadRequests();
                } else {
                    alert(res.message || 'Gagal memproses validasi.');
                }
            })
            .catch(() => {
                alert('Kesalahan jaringan database backend.');
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user-session')
                .then(res => res.json())
                .then(session => {
                    if (!session.valid || session.user.role !== 'owner') {
                        window.location.href = '/login';
                        return;
                    }
                    loadRequests();
                })
                .catch(() => {
                    window.location.href = '/login';
                });
        });
    </script>
</body>
</html>
