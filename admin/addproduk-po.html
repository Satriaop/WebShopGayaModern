<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tambah produk po - admin panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0b0c10] text-gray-300 min-h-screen w-full flex flex-col select-none overflow-x-hidden p-4 sm:p-6">

    <div class="w-full max-w-2xl mx-auto bg-[#141522] border border-[#212330] rounded-2xl shadow-2xl p-5 sm:p-6 space-y-6">
        
        <div class="flex items-center justify-between border-b border-[#212330] pb-4">
            <div class="flex items-center gap-3">
                <a href="/admin/dashboard" class="w-10 h-10 rounded-xl bg-[#1a1c28] border border-[#262938] flex items-center justify-center text-zinc-400 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-base font-bold text-white tracking-wide">add pre-order product</h1>
                    <p class="text-[11px] text-red-500 font-medium">sistem antrean & kuota po</p>
                </div>
            </div>
            <i class="fa-solid fa-box text-[#dc2626] text-xl"></i>
        </div>

        <form id="poProductForm" class="space-y-5">
            
            <div class="space-y-2">
                <label class="text-[11px] font-semibold text-zinc-400 block">pilih kategori po :</label>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="setCategory('AKUN PREMIUM')" id="cat-AKUN PREMIUM" class="cat-btn py-3 px-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide hover:text-white transition">akun premium</button>
                    <button type="button" onclick="setCategory('APLIKASI STREAMING')" id="cat-APLIKASI STREAMING" class="cat-btn py-3 px-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide hover:text-white transition">aplikasi streaming</button>
                    <button type="button" onclick="setCategory('AKUN GAME')" id="cat-AKUN GAME" class="cat-btn py-3 px-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide hover:text-white transition">akun game</button>
                    <button type="button" onclick="setCategory('LAIN NYA')" id="cat-LAIN NYA" class="cat-btn py-3 px-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide hover:text-white transition">lainnya</button>
                </div>
                <input type="hidden" id="selectedCategory" required>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-semibold text-zinc-400 block">nama produk po :</label>
                    <input type="text" id="productName" placeholder="contoh: youtube premium po" class="w-full bg-[#171824] border border-[#252736] focus:border-red-500/50 rounded-xl px-4 py-3 text-sm font-semibold text-white placeholder-zinc-600 outline-none transition" required>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[11px] font-semibold text-zinc-400 block">id produk po (auto) :</label>
                    <input type="text" id="productId" class="w-full bg-[#13141f] text-zinc-500 border border-[#212330] rounded-xl px-4 py-3 text-sm font-mono font-bold outline-none cursor-not-allowed" readonly>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-semibold text-zinc-400 block">foto produk :</label>
                <div class="flex items-center gap-3">
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="uploadToImgBB(this)">
                    <button type="button" onclick="document.getElementById('fileInput').click()" class="px-5 py-3 bg-[#1c1d2a] border border-[#282a3a] hover:border-zinc-700 rounded-xl font-bold text-xs text-zinc-300 transition flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up text-red-500"></i> pilih file foto
                    </button>
                    <div id="uploadStatus" class="text-[11px] font-bold text-zinc-500 tracking-wider">belum ada file</div>
                </div>
                <input type="hidden" id="productImageUrl" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-semibold text-zinc-400 block">estimasi proses po (hari) :</label>
                    <input type="number" id="estimasiHari" placeholder="contoh: 3" class="w-full bg-[#171824] border border-[#252736] focus:border-red-500/50 rounded-xl px-4 py-3 text-sm font-semibold text-white outline-none transition" required>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[11px] font-semibold text-zinc-400 block">jumlah slot / kuota po :</label>
                    <input type="number" id="kuotaStok" placeholder="contoh: 50" class="w-full bg-[#171824] border border-[#252736] focus:border-red-500/50 rounded-xl px-4 py-3 text-sm font-semibold text-white outline-none transition" required>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[11px] font-semibold text-zinc-400 block">harga per slot (rp) :</label>
                    <input type="number" id="productHarga" placeholder="contoh: 35000" class="w-full bg-[#171824] border border-[#252736] focus:border-red-500/50 rounded-xl px-4 py-3 text-sm font-semibold text-white outline-none transition" required>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[11px] font-semibold text-zinc-400 block">kirim notif via email?</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" onclick="setEmailNotify(true)" id="email-true" class="email-btn py-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide transition">ya</button>
                        <button type="button" onclick="setEmailNotify(false)" id="email-false" class="email-btn py-3 bg-red-600/10 border border-red-500 text-red-500 rounded-xl font-bold text-xs tracking-wide transition">tidak</button>
                    </div>
                    <input type="hidden" id="sendViaEmail" value="false" required>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[11px] font-semibold text-zinc-400 block">deskripsi ketentuan pre-order :</label>
                <textarea id="productDeskripsi" rows="3" placeholder="tuliskan detail ketentuan pengerjaan po..." class="w-full bg-[#171824] border border-[#252736] focus:border-red-500/50 rounded-xl p-4 text-xs font-semibold text-white outline-none transition" required></textarea>
            </div>

            <button type="submit" class="w-full py-4 bg-[#dc2626] hover:bg-[#b91c1c] text-white font-bold text-xs tracking-widest rounded-xl transition shadow-xl shadow-red-600/10 active:scale-[0.99]">
                <i class="fa-solid fa-circle-check mr-1.5"></i> simpan dan masukkan data po
            </button>

        </form>
    </div>

    <script>
        const IMGBB_KEY = '37e84e2162972cbe655f784aff8b9218';
        let currentCategory = '';

        function generatePOID() {
            return 'po-' + Math.floor(100000 + Math.random() * 900000);
        }

        function setCategory(cat) {
            currentCategory = cat;
            document.getElementById('selectedCategory').value = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = "cat-btn py-3 px-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide hover:text-white transition";
            });
            document.getElementById('cat-' + cat).className = "cat-btn py-3 px-3 bg-red-600/10 border border-red-500 text-red-500 rounded-xl font-bold text-xs tracking-wide transition shadow-md shadow-red-500/5";
            document.getElementById('productId').value = generatePOID();
        }

        function setEmailNotify(status) {
            document.getElementById('sendViaEmail').value = status;
            document.querySelectorAll('.email-btn').forEach(btn => {
                btn.className = "email-btn py-3 bg-[#1c1d2a] border border-[#282a3a] rounded-xl font-bold text-xs text-zinc-400 tracking-wide transition";
            });
            document.getElementById('email-' + status).className = "email-btn py-3 bg-red-600/10 border border-red-500 text-red-500 rounded-xl font-bold text-xs tracking-wide transition shadow-md shadow-red-500/5";
        }

        function uploadToImgBB(input) {
            const file = input.files[0];
            if (!file) return;
            const status = document.getElementById('uploadStatus');
            status.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-red-500 mr-1"></i> uploading...';
            
            const formData = new FormData();
            formData.append('image', file);

            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    let directUrl = res.data.display_url.replace('i.ibb.co/', 'i.ibb.co.com/');
                    document.getElementById('productImageUrl').value = directUrl;
                    status.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-400 mr-1"></i> selesai';
                } else {
                    status.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 mr-1"></i> gagal';
                }
            })
            .catch(() => status.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 mr-1"></i> error net');
        }

        document.getElementById('poProductForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const category = document.getElementById('selectedCategory').value;
            const productId = document.getElementById('productId').value;
            const productName = document.getElementById('productName').value;
            const imageUrl = document.getElementById('productImageUrl').value;
            const estimasiHari = parseInt(document.getElementById('estimasiHari').value);
            const kuotaStok = parseInt(document.getElementById('kuotaStok').value);
            const harga = parseInt(document.getElementById('productHarga').value);
            const sendViaEmail = document.getElementById('sendViaEmail').value === "true";
            const deskripsi = document.getElementById('productDeskripsi').value;

            if(!category) return alert('pilih kategori po terlebih dahulu!');
            if(!imageUrl) return alert('silakan upload foto produk terlebih dahulu!');

            const finalPayload = {
                category: category,
                productId: productId,
                productName: productName,
                imageUrl: imageUrl,
                sistemPenjualan: "PO",
                estimasiHari: estimasiHari,
                stokKuota: kuotaStok,
                harga: harga,
                sendViaEmail: sendViaEmail,
                deskripsi: deskripsi
            };

            fetch('/api/admin/product-po/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalPayload)
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    alert('sukses menyimpan produk po ke database!');
                    window.location.href = '/admin/dashboard';
                } else {
                    alert('gagal simpan: ' + res.message);
                }
            })
            .catch(() => alert('terjadi gangguan server atau koneksi terputus.'));
        });
    </script>
</body>
</html>
