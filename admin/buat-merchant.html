<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buat Toko Merchant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex items-center justify-center p-4 select-none">

    <div class="w-full max-w-md bg-[#14151f] border border-zinc-800/80 rounded-2xl shadow-2xl p-6 space-y-6">
        
        <div class="text-center space-y-1">
            <div class="text-xs font-black tracking-widest text-red-500 uppercase">MERCHANT SETUP SYSTEM</div>
            <h2 class="text-xl font-extrabold text-white tracking-tight">Konfigurasi Toko Baru</h2>
            <p class="text-xs text-zinc-500">Lengkapi data di bawah untuk mendaftarkan merchant kamu.</p>
        </div>

        <form id="merchantForm" class="space-y-4">
            
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Nama Toko :</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600"><i class="fa-solid fa-store text-xs"></i></span>
                    <input type="text" id="namaToko" required placeholder="Masukkan nama toko/brand" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/60 rounded-xl pl-9 pr-3 py-2.5 text-xs font-semibold text-white placeholder-zinc-600 focus:outline-none transition">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Email Pemilik Toko :</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600"><i class="fa-solid fa-envelope text-xs"></i></span>
                    <input type="email" id="emailPemilik" required placeholder="alamat@email.com" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/60 rounded-xl pl-9 pr-3 py-2.5 text-xs font-semibold text-white placeholder-zinc-600 focus:outline-none transition">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Nomor Pemilik Toko :</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600"><i class="fa-solid fa-phone text-xs"></i></span>
                    <input type="number" id="nomorPemilik" required placeholder="628xxxxxxxxxx" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/60 rounded-xl pl-9 pr-3 py-2.5 text-xs font-semibold text-white placeholder-zinc-600 focus:outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">Pilih Metode :</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600"><i class="fa-solid fa-wallet text-xs"></i></span>
                        <select id="metodePencairan" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/60 rounded-xl pl-9 pr-3 py-2.5 text-xs font-bold text-white focus:outline-none transition appearance-none cursor-pointer">
                            <option value="DANA" selected>DANA</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-wider">No Pencairan Saldo :</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-zinc-600"><i class="fa-solid fa-money-check-dollar text-xs"></i></span>
                        <input type="number" id="nomorPencairan" required placeholder="08xxxxxxxxxx" class="w-full bg-zinc-900/60 border border-zinc-800 focus:border-red-500/60 rounded-xl pl-9 pr-3 py-2.5 text-xs font-semibold text-white placeholder-zinc-600 focus:outline-none transition">
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-red-600 hover:bg-red-700 active:scale-[0.98] text-white font-black text-xs py-3 rounded-xl transition shadow-lg shadow-red-600/10 tracking-wider uppercase mt-2">
                Simpan Konfigurasi Merchant
            </button>
        </form>

        <div class="text-center">
            <a href="/admin/dashboard" class="text-[10px] font-bold text-zinc-500 hover:text-zinc-300 transition uppercase tracking-wider">
                <i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Dashboard
            </a>
        </div>
    </div>

    <script>
        document.getElementById('merchantForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = 'MENYIMPAN DATA...';

            const payload = {
                namaToko: document.getElementById('namaToko').value,
                emailPemilik: document.getElementById('emailPemilik').value,
                nomorPemilik: document.getElementById('nomorPemilik').value,
                metodePencairan: document.getElementById('metodePencairan').value,
                nomorPencairan: document.getElementById('nomorPencairan').value
            };

            fetch('/api/admin/merchant/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    window.location.href = '/admin/dashboard';
                }
            })
            .catch(() => alert('Terjadi kesalahan koneksi server.'))
            .finally(() => {
                btn.disabled = false;
                btn.innerText = 'Simpan Konfigurasi Merchant';
            });
        });
    </script>
</body>
</html>
