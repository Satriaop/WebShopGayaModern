<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>market jasa - nexamarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&family=Fira+Code:wght=400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f1015; }
        .font-mono { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex flex-col select-none overflow-x-hidden p-4 sm:p-6">

    <div class="w-full max-w-4xl mx-auto space-y-6 pb-24">
        
        <div class="flex items-center justify-between bg-[#14151f]/40 border border-zinc-800/60 p-5 rounded-2xl shadow-xl">
            <div class="flex items-center gap-3">
                <a href="/dashboard" class="w-9 h-9 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition active:scale-95">
                    <i class="fa-solid fa-arrow-left text-xs"></i>
                </a>
                <div>
                    <h1 class="text-xs font-black tracking-wider text-orange-500 uppercase">MARKET JASA</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">layanan joki & jasa digital premium</p>
                </div>
            </div>
            <i class="fa-solid fa-screwdriver-wrench text-orange-500 text-base"></i>
        </div>

        <div id="jasaListGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 w-full">
            <div class="col-span-full text-center py-12 bg-[#14151f]/40 border border-zinc-800/60 rounded-2xl">
                <i class="fa-solid fa-spinner fa-spin mr-2 text-orange-500"></i>
                <span class="text-zinc-500 text-xs font-bold uppercase tracking-wider">memuat daftar jasa...</span>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="w-full max-w-md bg-[#14151f] border border-zinc-800/80 rounded-2xl p-5 shadow-2xl relative">
            <button onclick="closeOrderModal()" class="absolute top-4 right-4 text-zinc-500 hover:text-white transition">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
            
            <div class="border-b border-zinc-800/80 pb-4 mb-4">
                <h3 class="text-sm font-black text-white uppercase tracking-wide">form pemesanan jasa</h3>
                <p id="modalJasaName" class="text-xs text-orange-500 font-bold mt-1 uppercase"></p>
                <p id="modalJasaPrice" class="text-[10px] text-zinc-400 font-mono mt-0.5"></p>
            </div>

            <form id="formOrderJasa" class="space-y-4">
                <input type="hidden" id="targetJasaId">
                
                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider px-1 block">email untuk dihubungi admin :</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-envelope absolute left-4 text-zinc-600 text-xs"></i>
                        <input type="email" id="inputEmailOrder" placeholder="email aktif kamu..." class="w-full bg-[#0f1015] border border-zinc-800/80 focus:border-orange-500/30 rounded-xl pl-11 pr-4 py-3 text-xs font-bold text-white placeholder-zinc-700 outline-none transition tracking-wide" required>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider px-1 block">isi format order / data login :</label>
                    <textarea id="inputFormatOrder" rows="4" placeholder="silakan isi format order sesuai ketentuan jasa (misal: id login, password, dll)..." class="w-full bg-[#0f1015] border border-zinc-800/80 focus:border-orange-500/30 rounded-xl px-4 py-3 text-xs font-mono font-medium text-zinc-300 placeholder-zinc-700 outline-none transition tracking-wide" required></textarea>
                </div>

                <div class="pt-2">
                    <button type="submit" id="btnSubmitOrder" class="w-full py-3.5 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 text-white font-black text-xs tracking-widest rounded-xl transition uppercase shadow-lg shadow-orange-600/10 active:scale-[0.99] flex justify-center items-center gap-2">
                        <i class="fa-solid fa-cart-shopping text-xs"></i> <span>bayar & proses pesanan</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Load data jasa dari server
        fetch('/api/user/list-jasa')
            .then(res => res.json())
            .then(res => {
                const grid = document.getElementById('jasaListGrid');
                grid.innerHTML = '';

                if (!res.success || !res.data || res.data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center p-12 bg-[#14151f]/40 border border-zinc-800/60 rounded-2xl"><p class="text-zinc-600 text-xs font-bold uppercase tracking-wider">belum ada layanan jasa tersedia</p></div>`;
                    return;
                }

                res.data.forEach(jasa => {
                    const card = document.createElement('div');
                    card.className = "bg-[#14151f]/60 border border-zinc-800/60 hover:border-orange-500/30 rounded-2xl overflow-hidden shadow-lg hover:shadow-[0_0_20px_rgba(249,115,22,0.05)] transition duration-300 group flex flex-col";
                    
                    card.innerHTML = `
                        <div class="relative w-full h-36 bg-[#0f1015] overflow-hidden border-b border-zinc-800/60">
                            <img src="${jasa.imageUrl || 'https://via.placeholder.com/400x200'}" alt="" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 group-hover:scale-105 transition duration-500">
                            <div class="absolute top-2 left-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-[8px] font-black text-orange-400 uppercase tracking-widest border border-white/5">
                                ${jasa.kategori}
                            </div>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h2 class="text-sm font-extrabold text-white tracking-wide line-clamp-1 group-hover:text-orange-500 transition">${jasa.namaJasa.toLowerCase()}</h2>
                            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-1">ESTIMASI: ${jasa.estimasiHari} HARI</p>
                            <p class="text-[10px] text-zinc-400 font-medium mt-2 line-clamp-2 leading-relaxed flex-grow">${jasa.deskripsi.toLowerCase()}</p>
                            
                            <div class="flex items-center justify-between mt-4 pt-3 border-t border-zinc-800/60">
                                <p class="text-sm font-black text-orange-500">
                                    rp ${parseInt(jasa.harga).toLocaleString('id-ID')}
                                </p>
                                <button onclick="openOrderModal('${jasa.jasaId}', '${jasa.namaJasa.replace(/'/g, "\\'")}', '${jasa.harga}')" class="bg-zinc-900 hover:bg-zinc-800 text-white border border-zinc-700 hover:border-orange-500/50 text-[10px] font-black px-3 py-1.5 rounded-lg transition uppercase tracking-wider">
                                    order jasa
                                </button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(() => {
                document.getElementById('jasaListGrid').innerHTML = `<div class="col-span-full text-center p-12 bg-[#14151f]/40 border border-zinc-800/60 rounded-2xl"><p class="text-red-500 text-xs font-bold uppercase tracking-wider">gagal memuat data jasa</p></div>`;
            });

        // Logika Pop-up Modal
        function openOrderModal(id, nama, harga) {
            document.getElementById('targetJasaId').value = id;
            document.getElementById('modalJasaName').innerText = nama;
            document.getElementById('modalJasaPrice').innerText = 'Tarif: Rp ' + parseInt(harga).toLocaleString('id-ID');
            
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.add('hidden');
            document.getElementById('formOrderJasa').reset();
        }

        // Eksekusi Order
        document.getElementById('formOrderJasa').addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (!confirm('Apakah kamu yakin ingin memesan jasa ini? Saldo akan dipotong sesuai harga.')) return;

            const btnSubmit = document.getElementById('btnSubmitOrder');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-xs"></i> <span>memproses...</span>`;

            const payloadData = {
                jasaId: document.getElementById('targetJasaId').value,
                emailKontak: document.getElementById('inputEmailOrder').value,
                formatOrder: document.getElementById('inputFormatOrder').value
            };

            fetch('/api/user/order-jasa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloadData)
            })
            .then(res => res.json())
            .then(res => {
                alert(res.message);
                if(res.success) {
                    closeOrderModal();
                    window.location.reload(); // Reload untuk update saldo di UI atas jika ada
                }
            })
            .catch(() => alert('terjadi gangguan jaringan.'))
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-cart-shopping text-xs"></i> <span>bayar & proses pesanan</span>`;
            });
        });
    </script>
</body>
</html>
