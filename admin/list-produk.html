<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Produk Saya - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f1015; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="text-gray-200 min-h-screen w-full flex flex-col select-none overflow-x-hidden p-4 sm:p-6">

    <div class="w-full max-w-4xl mx-auto space-y-6">
        
        <div class="flex items-center justify-between border-b border-zinc-800 pb-5">
            <div class="flex items-center gap-3">
                <a href="/admin/dashboard" class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="text-base font-black text-white tracking-wide uppercase">MY PRODUCTS LIST</h1>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-wider">Manage Your Active Digital Store Items</p>
                </div>
            </div>
            <a href="/admin/tambah-produk" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-black text-xs tracking-wider rounded-xl transition uppercase flex items-center gap-1.5 shadow-lg shadow-red-600/10">
                <i class="fa-solid fa-plus text-[10px]"></i> Tambah
            </a>
        </div>

        <div id="loadingState" class="text-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-2 border-red-500 border-t-transparent mx-auto mb-4"></div>
            <p class="text-xs font-black text-zinc-500 uppercase tracking-widest">Loading your store products...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-20 border border-dashed border-zinc-800 rounded-2xl bg-[#14151f]/40">
            <i class="fa-solid fa-box-open text-zinc-700 text-5xl mb-3"></i>
            <h3 class="text-sm font-black text-white uppercase">Belum Ada Produk</h3>
            <p class="text-[11px] text-zinc-500 font-bold uppercase tracking-wider mt-1">Kamu belum mengupload produk jualan apapun ke sistem</p>
        </div>

        <div id="myProductsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
        
    </div>

    <script>
        function formatRupiah(angka) {
            return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
        }

        async function loadMyStoreProducts() {
            try {
                const response = await fetch('/api/admin/toko-products');
                const result = await response.json();
                
                document.getElementById('loadingState').classList.add('hidden');

                if (result.success && result.data.length > 0) {
                    renderMyProducts(result.data);
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loadingState').innerHTML = `
                    <i class="fa-solid fa-circle-exclamation text-red-500 text-3xl mb-2"></i>
                    <p class="text-xs font-black text-red-500 uppercase tracking-wider">ERROR MENGAMBIL DATA BACKEND</p>
                `;
            }
        }

        function renderMyProducts(products) {
            const grid = document.getElementById('myProductsGrid');
            grid.innerHTML = '';

            products.forEach(product => {
                let hargaDisplay = 0;
                let stokTotal = 0;

                if (product.items && product.items.length > 0) {
                    hargaDisplay = product.items[0].harga || 0;
                    product.items.forEach(item => {
                        stokTotal += parseInt(item.stok || 0);
                    });
                }

                const badgeStok = stokTotal > 0 
                    ? `<span class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded-md">STOK: ${stokTotal}</span>`
                    : `<span class="bg-red-500/10 border border-red-500/20 text-red-500 text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded-md">HABIS</span>`;

                const card = document.createElement('div');
                card.className = "bg-[#14151f] border border-zinc-800 rounded-2xl p-4 flex flex-col justify-between space-y-4 shadow-xl";

                card.innerHTML = `
                    <div class="space-y-3">
                        <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-zinc-950 border border-zinc-800">
                            <img src="${product.imageUrl || product.image || 'https://via.placeholder.com/300x169/14151f/ffffff?text=NO+IMAGE'}" class="w-full h-full object-cover">
                            <div class="absolute top-2 left-2">
                                <span class="bg-black/70 backdrop-blur-md border border-zinc-800 text-white text-[9px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider">${product.category}</span>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <div class="flex items-center justify-between gap-2">
                                <h3 class="text-sm font-black text-white uppercase tracking-wide truncate">${product.productName}</h3>
                                ${badgeStok}
                            </div>
                            <p class="text-[10px] font-mono text-zinc-500 font-bold tracking-tight">${product.productId || product.id}</p>
                        </div>
                    </div>

                    <div class="space-y-3 pt-2">
                        <div class="border-t border-dashed border-zinc-800 pt-3 flex items-center justify-between">
                            <div>
                                <p class="text-[9px] text-zinc-500 font-bold tracking-wider uppercase">HARGA VARIAN 1</p>
                                <p class="text-xs font-black text-red-500 tracking-wide">${formatRupiah(hargaDisplay)}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-zinc-500 font-bold tracking-wider uppercase">TOTAL DATA</p>
                                <p class="text-[10px] font-black text-zinc-300">${product.items ? product.items.length : 0} ITEMS</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-2">
                            <a href="/admin/edit-produk?id=${product.productId || product.id}" class="w-full py-2.5 bg-zinc-900 border border-zinc-800 hover:bg-zinc-800 text-zinc-300 hover:text-white font-black text-xs tracking-widest rounded-xl transition uppercase flex items-center justify-center gap-2">
                                <i class="fa-solid fa-pen-to-square text-[11px] text-red-500"></i> EDIT CONFIG
                            </a>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', loadMyStoreProducts);
    </script>
</body>
</html>
