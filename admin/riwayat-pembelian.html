<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riwayat Pembelian Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex relative select-none overflow-x-hidden">

    <div class="flex-grow flex flex-col min-h-screen w-full">
        
        <header class="w-full bg-[#11121a]/60 border-b border-zinc-800/50 px-4 sm:px-6 py-4 flex items-center shrink-0 sticky top-0 backdrop-blur-xl z-10">
            <a href="/admin/dashboard" class="w-9 h-9 rounded-xl bg-zinc-900 flex items-center justify-center border border-zinc-800 text-zinc-400 hover:text-white transition active:scale-95 mr-3">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <div class="text-[10px] sm:text-xs text-zinc-400 font-bold uppercase tracking-wider">Kembali ke Dashboard</div>
        </header>

        <main class="flex-grow p-4 sm:p-6 space-y-6 w-full max-w-4xl mx-auto">
            
            <div class="space-y-1">
                <h2 class="text-xl font-black text-white tracking-wide uppercase flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-red-500"></i>
                    Riwayat Pembelian Admin
                </h2>
                <p class="text-xs text-zinc-500 font-bold uppercase tracking-wider">Daftar semua produk digital yang dibeli oleh akun admin kamu</p>
            </div>

            <div class="relative w-full shadow-xl shrink-0">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-zinc-500 text-sm"></i>
                </span>
                <input type="text" id="searchInput" oninput="filterOrders()" placeholder="Cari ID transaksi, nama produk atau penjual..." class="w-full bg-[#14151f] text-xs font-semibold text-white placeholder-zinc-600 pl-11 pr-4 py-3.5 rounded-2xl border border-zinc-800/80 focus:outline-none focus:border-red-500/50 transition-all duration-300">
            </div>

            <div id="loadingState" class="py-20 text-center">
                <div class="w-8 h-8 border-4 border-t-red-500 border-zinc-800 rounded-full animate-spin mx-auto mb-3"></div>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Sedang memuat data transaksi admin...</p>
            </div>

            <div id="emptyState" class="hidden bg-[#14151f]/50 border border-zinc-800/60 p-10 rounded-2xl text-center">
                <i class="fa-solid fa-receipt text-3xl text-zinc-700 mb-3"></i>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Kamu belum pernah melakukan transaksi pembelian apa pun.</p>
            </div>

            <div id="orderListContainer" class="space-y-4 hidden flex flex-col w-full"></div>

        </main>
    </div>

    <script>
        let allOrders = [];

        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/user-session')
                .then(res => res.json())
                .then(sessionData => {
                    if (!sessionData.valid) {
                        window.location.href = '/login';
                        return;
                    }
                    
                    const currentAdminUsername = sessionData.user.username.toLowerCase();

                    return fetch('/api/admin/riwayat-global-pembelian')
                        .then(res => res.json())
                        .then(res => {
                            document.getElementById('loadingState').classList.add('hidden');
                            
                            if (res.success && res.data && res.data.length > 0) {
                                allOrders = res.data.filter(item => {
                                    const buyer = item.buyerUsername || item.buyer || '';
                                    return buyer.toLowerCase() === currentAdminUsername;
                                });

                                if (allOrders.length > 0) {
                                    renderOrders(allOrders);
                                } else {
                                    document.getElementById('emptyState').classList.remove('hidden');
                                }
                            } else {
                                document.getElementById('emptyState').classList.remove('hidden');
                            }
                        });
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                });
        });

        function renderOrders(orders) {
            const container = document.getElementById('orderListContainer');
            container.classList.remove('hidden');
            container.innerHTML = '';

            container.innerHTML = orders.slice().reverse().map(item => {
                const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('id-ID') : item.date || item.timestamp || '';
                const productImg = item.imageUrl || 'https://placehold.co/100x100/11121a/white?text=PRODUK';
                
                let dynamicDataBox = '';
                
                if (item.email || item.pw) {
                    dynamicDataBox = `
                        <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 truncate">
                            <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Email / User ID</span>
                            <span class="select-all font-mono text-zinc-300">${item.email || '-'}</span>
                        </div>
                        <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 truncate">
                            <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Password</span>
                            <span class="select-all font-mono text-zinc-300">${item.pw || '-'}</span>
                        </div>
                        <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                            <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">A2F Authenticator</span>
                            <span class="text-red-500 font-bold font-mono">${item.a2f || 'OFF'}</span>
                        </div>
                    `;
                } else if (item.linkApk) {
                    dynamicDataBox = `
                        <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                            <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Link Download / APK</span>
                            <a href="${item.linkApk}" target="_blank" class="text-red-500 hover:underline break-all font-mono">${item.linkApk}</a>
                        </div>
                    `;
                } else if (item.urlProduk) {
                    dynamicDataBox = `
                        <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                            <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">URL Akses Produk</span>
                            <a href="${item.urlProduk}" target="_blank" class="text-red-500 hover:underline break-all font-mono">${item.urlProduk}</a>
                        </div>
                    `;
                } else {
                    dynamicDataBox = `
                        <div class="text-zinc-600 text-[10px] font-mono italic p-2 col-span-1 sm:col-span-2">Tidak ada rincian data akun otomatis terlampir</div>
                    `;
                }

                if (item.deskripsi || item.deskripsiExt) {
                    dynamicDataBox += `
                        <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 col-span-1 sm:col-span-2 text-left">
                            <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase tracking-wider mb-1">Deskripsi :</span>
                            <div class="text-zinc-300 text-xs font-sans whitespace-pre-wrap leading-relaxed">${item.deskripsi || 'Tidak ada deskripsi'}</div>
                        </div>
                    `;
                }

                return `
                    <div class="bg-[#14151f]/80 border border-zinc-800/80 rounded-2xl shadow-xl p-5 space-y-4 block w-full text-left">
                        <div class="flex justify-between items-center border-b border-zinc-900/60 pb-3 w-full">
                            <div class="flex flex-col text-left">
                                <span class="text-xs font-mono font-bold text-zinc-300 block">${item.invoiceId || item.orderId || item.trx_id || 'ORD-0000'}</span>
                                <span class="text-[9px] text-zinc-500 mt-0.5 block">${dateStr}</span>
                            </div>
                            <span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-md font-black uppercase tracking-wider border border-emerald-500/10 h-fit">BERHASIL</span>
                        </div>

                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4 w-full">
                            <div class="flex items-start gap-4 flex-grow text-left">
                                <img src="${productImg}" class="w-16 h-16 rounded-xl object-cover border border-zinc-800 shrink-0 bg-[#11121a]">
                                <div class="space-y-1">
                                    <h3 class="text-sm font-black text-white tracking-wide uppercase block">${item.productName || 'Pembelian Produk'}</h3>
                                    <p class="text-zinc-400 text-[10px] font-bold uppercase tracking-wide block">Varian: <span class="text-red-500">${item.subName || '-'}</span></p>
                                    <p class="text-zinc-500 text-[10px] font-semibold uppercase tracking-wide block">Kategori: ${item.category || 'DIGITAL'}</p>
                                </div>
                            </div>
                            <div class="text-left sm:text-right shrink-0 w-full sm:w-auto border-t sm:border-0 border-zinc-900/60 pt-3 sm:pt-0">
                                <span class="text-[10px] text-zinc-500 font-bold uppercase block">Total Bayar</span>
                                <span class="text-sm font-black text-red-500 block">Rp ${parseInt(item.totalGrossPrice || 0).toLocaleString('id-ID')}</span>
                                <span class="text-[9px] text-zinc-500 block mt-0.5">${item.quantity || 1}x Barang</span>
                            </div>
                        </div>

                        <div class="bg-[#0f1015] border border-zinc-900 p-3 rounded-xl space-y-1.5 w-full text-left">
                            <span class="text-[9px] font-black text-red-500 uppercase tracking-wider block"><i class="fa-solid fa-key mr-1"></i> Data Rincian Pembelian :</span>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[11px] font-mono text-zinc-300">
                                ${dynamicDataBox}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterOrders() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allOrders.filter(o => {
                const idMatch = (o.invoiceId || o.orderId || '').toLowerCase().includes(keyword);
                const prodMatch = (o.productName || '').toLowerCase().includes(keyword);
                const categoryMatch = (o.category || '').toLowerCase().includes(keyword);
                
                return idMatch || prodMatch || categoryMatch;
            });

            const container = document.getElementById('orderListContainer');
            const empty = document.getElementById('emptyState');

            if (filtered.length > 0) {
                renderOrders(filtered);
                container.classList.remove('hidden');
                empty.classList.add('hidden');
            } else {
                container.classList.add('hidden');
                empty.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
