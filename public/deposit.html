<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deposit Otomatis Qris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .console-font { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex relative select-none overflow-x-hidden">

    <div class="flex-grow flex flex-col min-h-screen w-full overflow-x-hidden">
        <header class="w-full bg-[#14151f]/50 border-b border-zinc-800/80 px-4 sm:px-6 py-4 flex justify-between items-center sticky top-0 backdrop-blur-md z-10">
            <div class="flex items-center space-x-3">
                <a href="/dashboard" id="btnBackDashboard" class="w-9 h-9 rounded-xl bg-zinc-900 flex items-center justify-center border border-zinc-800 text-zinc-400 hover:text-white transition active:scale-95">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                </a>
                <div class="text-xs text-zinc-400 font-bold uppercase tracking-wider">Kembali ke Dashboard</div>
            </div>
            <div class="text-xs font-black tracking-wider text-purple-500 uppercase">{{config.webNameUpper}} PAY</div>
        </header>

        <main class="flex-grow p-4 sm:p-6 space-y-6 w-full max-w-xl mx-auto">
            
            <div id="formSection" class="bg-[#14151f]/80 border border-zinc-800/80 p-5 rounded-2xl shadow-xl space-y-4">
                <div>
                    <h4 class="text-white font-extrabold text-sm uppercase tracking-wider">Top Up Saldo via QRIS</h4>
                    <p class="text-[11px] text-zinc-500 mt-0.5">Pilih atau input nominal deposit. QRIS tergenerate otomatis.</p>
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setAmount(5000)" class="py-2.5 bg-[#0f1015] border border-zinc-800 hover:border-purple-500/40 text-xs font-bold rounded-xl transition text-zinc-300 focus:border-purple-500 focus:text-purple-400">Rp 5.000</button>
                    <button onclick="setAmount(10000)" class="py-2.5 bg-[#0f1015] border border-zinc-800 hover:border-purple-500/40 text-xs font-bold rounded-xl transition text-zinc-300 focus:border-purple-500 focus:text-purple-400">Rp 10.000</button>
                    <button onclick="setAmount(20000)" class="py-2.5 bg-[#0f1015] border border-zinc-800 hover:border-purple-500/40 text-xs font-bold rounded-xl transition text-zinc-300 focus:border-purple-500 focus:text-purple-400">Rp 20.000</button>
                    <button onclick="setAmount(50000)" class="py-2.5 bg-[#0f1015] border border-zinc-800 hover:border-purple-500/40 text-xs font-bold rounded-xl transition text-zinc-300 focus:border-purple-500 focus:text-purple-400">Rp 50.000</button>
                    <button onclick="setAmount(100000)" class="py-2.5 bg-[#0f1015] border border-zinc-800 hover:border-purple-500/40 text-xs font-bold rounded-xl transition text-zinc-300 focus:border-purple-500 focus:text-purple-400">Rp 100.000</button>
                    <button onclick="setAmount(200000)" class="py-2.5 bg-[#0f1015] border border-zinc-800 hover:border-purple-500/40 text-xs font-bold rounded-xl transition text-zinc-300 focus:border-purple-500 focus:text-purple-400">Rp 200.000</button>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider px-1">Nomor Nominal Kustom</label>
                    <input type="number" id="depositAmount" placeholder="Atau ketik sendiri minimal 1000..." class="w-full bg-[#0f1015] border border-zinc-800 font-bold text-white rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500/50 transition">
                </div>

                <button onclick="generateQRIS()" id="btnGenerate" class="w-full py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-xl text-xs transition active:scale-[0.98] flex items-center justify-center gap-2">
                    <i class="fa-solid fa-qrcode"></i> Generate QRIS Sekarang
                </button>
            </div>

            <div id="qrisSection" class="hidden space-y-4">
                <div class="bg-[#14151f]/80 border border-zinc-800/80 p-6 rounded-2xl shadow-xl flex flex-col items-center text-center space-y-4">
                    <div>
                        <h4 class="text-white font-extrabold text-sm uppercase tracking-wider">Silakan Scan QRIS</h4>
                        <p class="text-[10px] text-zinc-500 mt-0.5">Total Bayar: <span class="text-purple-400 font-bold" id="renderTotal">Rp 0</span></p>
                    </div>
                    
                    <div class="p-3 bg-white rounded-2xl shadow-inner max-w-[220px]">
                        <img id="qrisImage" src="" alt="QRIS Code" class="w-full h-auto rounded-xl">
                    </div>
                    
                    <div class="text-[10px] bg-amber-500/10 border border-amber-500/20 text-amber-400 px-3 py-2 rounded-xl max-w-sm w-full">
                        <i class="fa-solid fa-triangle-exclamation mr-1"></i> Jangan ubah nominal transfer atau sesi invoice akan hangus!
                    </div>

                    <button onclick="cancelDepositInternal()" class="w-full max-w-sm py-2.5 bg-red-950/30 border border-red-500/30 hover:border-red-500/60 hover:bg-red-950/50 text-red-400 font-bold rounded-xl text-xs transition active:scale-[0.98] flex items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-xmark"></i> Batalkan Transaksi
                    </button>
                </div>

                <div class="bg-[#14151f]/80 border border-zinc-800/80 rounded-2xl shadow-xl overflow-hidden flex flex-col">
                    <div class="p-3 border-b border-zinc-900 bg-[#161722]/50 flex justify-between items-center px-4">
                        <h4 class="text-zinc-400 console-font font-bold text-[10px] uppercase tracking-wider">Console Terminal Monitor</h4>
                        <span class="flex h-2 w-2 relative">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                    </div>
                    <div id="consoleContainer" class="p-4 bg-[#0a0b10] h-40 overflow-y-auto console-font text-[11px] text-zinc-400 space-y-1 select-text">
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        let checkInterval = null;
        let isQrisActive = false;

        window.addEventListener('DOMContentLoaded', () => {
            const savedInvoice = localStorage.getItem('active_deposit');
            if (savedInvoice) {
                const data = JSON.parse(savedInvoice);
                activateQrisMode(data);
            }
        });

        window.addEventListener('beforeunload', (e) => {
            if (isQrisActive) {
                e.preventDefault();
                e.returnValue = 'Transaksi sedang diproses. Jangan refresh halaman agar data tidak error!';
                return e.returnValue;
            }
        });

        history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', () => {
            if (isQrisActive) {
                history.pushState(null, null, window.location.href);
                alert('Transaksi sedang berjalan! Selesaikan pembayaran terlebih dahulu.');
            }
        });

        function setAmount(val) {
            if (isQrisActive) return;
            document.getElementById('depositAmount').value = val;
        }

        function logToConsole(text, type = 'info') {
            const container = document.getElementById('consoleContainer');
            let colorClass = 'text-zinc-500';
            if (type === 'pending') colorClass = 'text-amber-400';
            if (type === 'success') colorClass = 'text-emerald-400 font-bold';
            if (type === 'error') colorClass = 'text-red-400';
            
            container.innerHTML += `<div class="${colorClass}">${text}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        function activateQrisMode(data) {
            isQrisActive = true;
            
            const btnBack = document.getElementById('btnBackDashboard');
            if (btnBack) {
                btnBack.removeAttribute('href');
                btnBack.style.opacity = '0.4';
                btnBack.style.pointerEvents = 'none';
            }

            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('qrisSection').classList.remove('hidden');
            document.getElementById('qrisImage').src = data.qr_image;
            document.getElementById('renderTotal').innerText = 'Rp ' + parseInt(data.amount).toLocaleString('id-ID');
            
            document.getElementById('consoleContainer').innerHTML = '';
            logToConsole(`[SYSTEM] Invoice active for amount: Rp ${data.amount}`);
            
            startStatusCheck(data.trx_id);
        }

        function generateQRIS() {
            const amount = document.getElementById('depositAmount').value;
            const btn = document.getElementById('btnGenerate');
            if(!amount || amount < 1000) return alert('Input nominal valid minimal Rp 1.000!');
            
            btn.disabled = true;
            btn.innerText = "Processing...";

            fetch('/api/deposit/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: parseInt(amount) })
            })
            .then(res => res.json())
            .then(res => {
                if(res.success) {
                    localStorage.setItem('active_deposit', JSON.stringify(res.data));
                    activateQrisMode(res.data);
                } else {
                    alert(res.message || 'Gagal membuat QRIS.');
                    btn.disabled = false;
                    btn.innerText = "Generate QRIS Sekarang";
                }
            })
            .catch(() => {
                alert('Terjadi kesalahan jaringan.');
                btn.disabled = false;
                btn.innerText = "Generate QRIS Sekarang";
            });
        }

        function startStatusCheck(trxId) {
            if(checkInterval) clearInterval(checkInterval);
            
            const checkLogic = () => {
                fetch('/api/deposit/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trx_id: trxId })
                })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        if (res.status === 'PENDING') {
                            logToConsole(`/cekstatusid ${trxId} status : pending`, 'pending');
                        } else if (res.status === 'SUCCESS') {
                            clearInterval(checkInterval);
                            localStorage.removeItem('active_deposit');
                            isQrisActive = false;
                            logToConsole(`[SUCCESS] Deposit Rp ${res.amount} sukses dimasukkan!`, 'success');
                            logToConsole(`[SYSTEM] Mengalihkan ke dashboard dalam 3 detik...`);
                            setTimeout(() => {
                                window.location.href = '/dashboard';
                            }, 3000);
                        } else {
                            logToConsole(`/cekstatusid ${trxId} status : ${res.status}`, 'error');
                        }
                    } else {
                        logToConsole(`[ERROR] Gagal mendapatkan respon valid dari backend`, 'error');
                    }
                })
                .catch(() => {
                    logToConsole(`[ERROR] Masalah koneksi cek status...`, 'error');
                });
            };

            checkLogic();
            checkInterval = setInterval(checkLogic, 5000);
        }

        function cancelDepositInternal() {
            if (!confirm('Apakah Anda yakin ingin membatalkan invoice deposit ini?')) return;

            if (checkInterval) clearInterval(checkInterval);

            localStorage.removeItem('active_deposit');

            isQrisActive = false;


            const btnBack = document.getElementById('btnBackDashboard');
            if (btnBack) {
                btnBack.setAttribute('href', '/dashboard');
                btnBack.style.opacity = '1';
                btnBack.style.pointerEvents = 'auto';
            }

            document.getElementById('qrisSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');

            const btn = document.getElementById('btnGenerate');
            btn.disabled = false;
            btn.innerText = "Generate QRIS Sekarang";
            
            alert('Deposit berhasil dibatalkan.');
        }
    </script>
</body>
</html>
