<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riwayat Pembelian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex relative select-none overflow-x-hidden">

    <div class="flex-grow flex flex-col min-h-screen w-full">
        
        <header class="w-full bg-[#11121a]/60 border-b border-zinc-800/50 px-4 sm:px-6 py-4 flex items-center shrink-0 sticky top-0 backdrop-blur-xl z-10">
            <a href="/dashboard" class="w-9 h-9 rounded-xl bg-zinc-900 flex items-center justify-center border border-zinc-800 text-zinc-400 hover:text-white transition active:scale-95 mr-3">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <div class="text-[10px] sm:text-xs text-zinc-400 font-bold uppercase tracking-wider">Kembali ke Dashboard</div>
        </header>

        <main class="flex-grow p-4 sm:p-6 space-y-6 w-full max-w-4xl mx-auto">
            
            <div class="space-y-1">
                <h2 class="text-xl font-black text-white tracking-wide uppercase flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping text-orange-500"></i>
                    Riwayat Pembelian Saya
                </h2>
                <p class="text-xs text-zinc-500 font-bold uppercase tracking-wider">Daftar produk digital dan script yang pernah kamu beli</p>
            </div>

            <div id="loadingState" class="py-20 text-center">
                <div class="w-8 h-8 border-4 border-t-orange-500 border-zinc-800 rounded-full animate-spin mx-auto mb-3"></div>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Sedang memuat data transaksi...</p>
            </div>

            <div id="emptyState" class="hidden bg-[#14151f]/50 border border-zinc-800/60 p-10 rounded-2xl text-center">
                <i class="fa-solid fa-box-open text-3xl text-zinc-700 mb-3"></i>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-wider">Kamu belum pernah melakukan pembelian produk apa pun.</p>
            </div>

            <div id="orderListContainer" class="space-y-4 hidden flex flex-col w-full"></div>

        </main>
    </div>

    <div id="ratingModal" class="fixed inset-0 z-50 invisible flex items-center justify-center p-4 transition-all duration-300">
        <div onclick="closeRatingModal()" class="absolute inset-0 bg-black/80 backdrop-blur-xs"></div>
        
        <div class="bg-[#14151f] border border-zinc-800 w-full max-w-md rounded-2xl p-5 shadow-2xl relative z-10 transform scale-95 opacity-0 transition-all duration-300" id="modalContainer">
            <div class="flex justify-between items-start border-b border-zinc-900 pb-3">
                <h3 class="text-white font-black text-sm tracking-wide uppercase flex items-center gap-2">
                    <i class="fa-solid fa-star text-orange-500"></i> Beri Rating Produk
                </h3>
                <button onclick="closeRatingModal()" class="text-zinc-500 hover:text-white transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="mt-4 space-y-1">
                <h4 id="targetProductName" class="text-white font-extrabold text-sm uppercase tracking-wide truncate">Loading...</h4>
                <p id="targetInvoice" class="text-[10px] font-mono text-zinc-500">INV-00000</p>
            </div>

            <div class="my-6 flex flex-col items-center justify-center gap-2 bg-[#0f1015] py-4 rounded-xl border border-zinc-900">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Pilih Bintang</span>
                <div class="flex gap-2 text-2xl">
                    <button onclick="setStars(1)" class="star-btn text-zinc-700 hover:scale-110 transition duration-150"><i class="fa-solid fa-star"></i></button>
                    <button onclick="setStars(2)" class="star-btn text-zinc-700 hover:scale-110 transition duration-150"><i class="fa-solid fa-star"></i></button>
                    <button onclick="setStars(3)" class="star-btn text-zinc-700 hover:scale-110 transition duration-150"><i class="fa-solid fa-star"></i></button>
                    <button onclick="setStars(4)" class="star-btn text-zinc-700 hover:scale-110 transition duration-150"><i class="fa-solid fa-star"></i></button>
                    <button onclick="setStars(5)" class="star-btn text-zinc-700 hover:scale-110 transition duration-150"><i class="fa-solid fa-star"></i></button>
                </div>
            </div>

            <div class="space-y-1.5 mb-5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 px-1">Tulis Ulasan / Komentar</label>
                <textarea id="ratingComment" rows="3" placeholder="Tulis kepuasanmu belanja disini atau isi ulasan produk script ini..." class="w-full bg-[#0f1015] border border-zinc-800 text-xs text-zinc-200 p-3 rounded-xl outline-none focus:border-orange-500/40 font-medium resize-none"></textarea>
            </div>

            <div class="flex gap-2">
                <button onclick="closeRatingModal()" class="w-1/3 py-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 font-bold rounded-xl text-xs transition">
                    Batal
                </button>
                <button onclick="submitRating()" class="w-2/3 py-2.5 bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold rounded-xl text-xs shadow-lg shadow-orange-500/10 transition active:scale-[0.98]">
                    Kirim Ulasan
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentSelectedRating = 0;
        let activeInvoice = '';
        let activeProductId = '';

        window.addEventListener('DOMContentLoaded', () => {
            fetch('/api/order/history')
                .then(res => res.json())
                .then(res => {
                    document.getElementById('loadingState').classList.add('hidden');
                    if (res.success && res.data && res.data.length > 0) {
                        const container = document.getElementById('orderListContainer');
                        container.classList.remove('hidden');
                        
                        container.innerHTML = res.data.reverse().map(item => {
                            const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('id-ID') : item.date || '';
                            const productImg = item.imageUrl || 'https://placehold.co/100x100/11121a/white?text=PRODUK';
                            
                            let ratingBtnHtml = '';
                            if (item.isRated) {
                                ratingBtnHtml = `
                                    <div class="flex items-center gap-1.5 bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-xl text-[10px] font-bold text-zinc-500">
                                        <i class="fa-solid fa-circle-check text-emerald-500"></i> SUDAH DI-RATING (${item.userRating} ★)
                                    </div>
                                `;
                            } else {
                                ratingBtnHtml = `
                                    <button onclick="openRatingModal('${item.invoiceId || item.trx_id}', '${item.productId}', '${String(item.productName || 'Produk').replace(/'/g, "\\'")}')" class="px-3 py-1.5 bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 text-orange-400 font-bold rounded-xl text-[10px] uppercase tracking-wider transition active:scale-95 flex items-center gap-1">
                                        <i class="fa-solid fa-star"></i> Beri Rating
                                    </button>
                                `;
                            }

                            let dynamicDataBox = '';
                            let commonDescriptions = `
                                <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 col-span-1 sm:col-span-2 text-left">
                                    <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase tracking-wider mb-1">Deskripsi Detail :</span>
                                    <div class="text-zinc-300 text-xs font-sans whitespace-pre-wrap leading-relaxed">${item.deskripsi || 'Tidak ada deskripsi utama'}</div>
                                </div>
                                <div class="bg-[#14151f] p-2.5 rounded-lg border border-zinc-800/40 col-span-1 sm:col-span-2 text-left">
                                    <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase tracking-wider mb-1">Deskripsi Tambahan / Catatan :</span>
                                    <div class="text-zinc-400 text-xs font-sans whitespace-pre-wrap leading-relaxed">${item.deskripsiExt || 'Tidak ada catatan tambahan'}</div>
                                </div>
                            `;

                            const currentCategory = String(item.category || '').toUpperCase();

                            if (currentCategory === 'APLIKASI STREAMING') {
                                dynamicDataBox = `
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Link APK / Download</span>
                                        <a href="${item.linkApk || '#'}" target="_blank" class="text-orange-500 hover:underline hover:text-orange-400 break-all">${item.linkApk || 'Tidak ada link'}</a>
                                    </div>
                                    ${commonDescriptions}
                                `;
                            } else if (currentCategory === 'AKUN GAME') {
                                dynamicDataBox = `
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Email / User ID</span>
                                        <span class="select-all">${item.email || '-'}</span>
                                    </div>
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Password Game</span>
                                        <span class="select-all">${item.pw || '-'}</span>
                                    </div>
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">A2F Authenticator</span>
                                        <span class="text-orange-500 font-bold">${item.a2f || 'OFF'}</span>
                                    </div>
                                    ${commonDescriptions}
                                `;
                            } else if (currentCategory === 'LAIN NYA' || currentCategory === 'LAINNYA') {
                                dynamicDataBox = `
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">URL / Link Produk</span>
                                        <a href="${item.urlProduk || '#'}" target="_blank" class="text-orange-500 hover:underline hover:text-orange-400 break-all">${item.urlProduk || 'Tidak ada link'}</a>
                                    </div>
                                    ${commonDescriptions}
                                `;
                            } else {
                                dynamicDataBox = `
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Email / User</span>
                                        <span class="select-all">${item.email || '-'}</span>
                                    </div>
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Password / Key</span>
                                        <span class="select-all">${item.pw || '-'}</span>
                                    </div>
                                    ${item.linkApk ? `
                                    <div class="bg-[#14151f] p-2 rounded-lg border border-zinc-800/40 truncate col-span-1 sm:col-span-2">
                                        <span class="text-zinc-500 font-sans font-bold text-[9px] block uppercase">Link Akses Tambahan</span>
                                        <a href="${item.linkApk}" target="_blank" class="text-orange-500 hover:underline break-all">${item.linkApk}</a>
                                    </div>` : ''}
                                    ${commonDescriptions}
                                `;
                            }

                            return `
                                <div class="bg-[#14151f]/80 border border-zinc-800/80 rounded-2xl shadow-xl p-5 space-y-4 block w-full text-left">
                                    <div class="flex justify-between items-center border-b border-zinc-900/60 pb-3 w-full">
                                        <div class="flex flex-col text-left">
                                            <span class="text-xs font-mono font-bold text-zinc-300 block">${item.invoiceId || item.trx_id || 'INV-0000'}</span>
                                            <span class="text-[9px] text-zinc-500 mt-0.5 block">${dateStr}</span>
                                        </div>
                                        <span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-md font-black uppercase tracking-wider border border-emerald-500/10 h-fit">BERHASIL</span>
                                    </div>

                                    <div class="flex flex-col sm:flex-row justify-between items-start gap-4 w-full">
                                        <div class="flex items-start gap-4 flex-grow text-left">
                                            <img src="${productImg}" class="w-16 h-16 rounded-xl object-cover border border-zinc-800 shrink-0 bg-[#11121a]">
                                            <div class="space-y-1">
                                                <h3 class="text-sm font-black text-white tracking-wide uppercase block">${item.productName || 'Pembelian Produk'}</h3>
                                                <p class="text-zinc-400 text-[10px] font-bold uppercase tracking-wide block">Varian: <span class="text-orange-500">${item.subName || '-'}</span></p>
                                                <p class="text-zinc-500 text-[10px] font-medium uppercase tracking-wide block">Kategori: ${item.category || 'PRODUK'}</p>
                                            </div>
                                        </div>
                                        <div class="text-left sm:text-right shrink-0 w-full sm:w-auto border-t sm:border-0 border-zinc-900/60 pt-3 sm:pt-0">
                                            <span class="text-[10px] text-zinc-500 font-bold uppercase block">Total Harga</span>
                                            <span class="text-sm font-black text-white block">Rp ${parseInt(item.totalGrossPrice || 0).toLocaleString('id-ID')}</span>
                                            <span class="text-[9px] text-zinc-500 block mt-0.5">${item.quantity || 1}x Barang</span>
                                        </div>
                                    </div>

                                    <div class="bg-[#0f1015] border border-zinc-900 p-3 rounded-xl space-y-1.5 w-full text-left">
                                        <span class="text-[9px] font-black text-orange-500 uppercase tracking-wider block"><i class="fa-solid fa-key mr-1"></i> Data Rincian Pembelian :</span>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-[11px] font-mono text-zinc-300">
                                            ${dynamicDataBox}
                                        </div>
                                    </div>

                                    <div class="flex justify-end pt-2 border-t border-zinc-900/40 w-full">
                                        ${ratingBtnHtml}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        document.getElementById('emptyState').classList.remove('hidden');
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                });
        });

        function openRatingModal(invoiceId, productId, productName) {
            activeInvoice = invoiceId;
            activeProductId = productId;
            currentSelectedRating = 0;
            
            document.getElementById('targetProductName').innerText = productName;
            document.getElementById('targetInvoice').innerText = invoiceId;
            document.getElementById('ratingComment').value = '';
            
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach(s => s.className = 'star-btn text-zinc-700 hover:scale-110 transition duration-150');

            const modal = document.getElementById("ratingModal");
            const container = document.getElementById("modalContainer");
            modal.classList.remove("invisible");
            setTimeout(() => {
                container.classList.remove("scale-95", "opacity-0");
                container.classList.add("scale-100", "opacity-100");
            }, 10);
        }

        function closeRatingModal() {
            const modal = document.getElementById("ratingModal");
            const container = document.getElementById("modalContainer");
            container.classList.remove("scale-100", "opacity-100");
            container.classList.add("scale-95", "opacity-0");
            setTimeout(() => { modal.classList.add("invisible"); }, 300);
        }

        function setStars(ratingValue) {
            currentSelectedRating = ratingValue;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((star, index) => {
                if (index < ratingValue) {
                    star.className = 'star-btn text-orange-500 scale-105 transition duration-150';
                } else {
                    star.className = 'star-btn text-zinc-700 hover:scale-110 transition duration-150';
                }
            });
        }

        function submitRating() {
            if (currentSelectedRating === 0) {
                alert('Silahkan pilih bintang rating terlebih dahulu!');
                return;
            }

            const commentValue = document.getElementById('ratingComment').value;

            fetch('/api/order/rate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    invoiceId: activeInvoice,
                    productId: activeProductId,
                    rating: currentSelectedRating,
                    comment: commentValue
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    window.location.reload();
                } else {
                    alert(data.message || 'Gagal mengirim ulasan');
                }
            })
            .catch(() => {
                alert('Terjadi kesalahan koneksi internet.');
            });
        }
    </script>
</body>
</html>
