<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Request Role Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex relative select-none">

    <div class="flex-grow flex flex-col min-h-screen w-full max-w-md mx-auto p-4 justify-center">
        
        <div class="bg-[#14151f]/80 border border-zinc-800/80 p-6 rounded-2xl shadow-xl space-y-5">
            <div class="flex items-center space-x-3">
                <a href="/dashboard" class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center border border-zinc-800 text-zinc-400 transition hover:text-white hover:bg-zinc-800">
                    <i class="fa-solid fa-arrow-left text-xs"></i>
                </a>
                <h4 class="text-white font-extrabold text-sm uppercase tracking-wider">Form Pengajuan Jabatan</h4>
            </div>

            <div class="p-3.5 bg-orange-500/10 border border-orange-500/20 text-orange-400 rounded-xl space-y-1">
                <div class="text-xs font-black uppercase flex items-center gap-1.5">
                    <i class="fa-solid fa-circle-info animate-pulse"></i> INFORMASI PENTING
                </div>
                <p class="text-[10px] leading-relaxed font-semibold text-zinc-400">
                    Pengajuan tingkat akun menjadi <span class="text-white font-bold">ADMIN</span> akan memberikan Anda akses panel khusus. <span class="text-emerald-400 font-bold">Saldo Anda dipastikan 100% AMAN</span> dan tidak akan terhapus selama proses transisi jabatan ini.
                </p>
            </div>

            <div class="space-y-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider px-1">Pilih Target Role</label>
                    <select id="roleRequested" class="w-full bg-[#0f1015] border border-zinc-800 font-bold text-orange-500 rounded-xl px-4 py-3 text-xs outline-none cursor-not-allowed" disabled>
                        <option value="admin">ADMIN (PENENGAH SISTEM)</option>
                    </select>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider px-1">Alasan Penunjukan / Deskripsi Kerja</label>
                    <textarea id="alasanRequest" rows="3" placeholder="Tuliskan alasan mengapa owner harus menerima pengajuan admin Anda..." class="w-full bg-[#0f1015] border border-zinc-800 font-semibold text-white rounded-xl px-4 py-3 text-xs outline-none focus:border-orange-500/50 transition resize-none"></textarea>
                </div>

                <button onclick="kirimRequestRole()" id="btnSubmitRequest" class="w-full py-3 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-xl text-xs transition flex items-center justify-center gap-2 uppercase tracking-wider shadow-lg shadow-orange-900/20 active:scale-[0.98]">
                    <i class="fa-solid fa-paper-plane"></i> Ajukan Pengajuan Ke Owner
                </button>
            </div>
        </div>
        
    </div>

    <script>
        function kirimRequestRole() {
            const roleRequested = document.getElementById('roleRequested').value;
            const alasan = document.getElementById('alasanRequest').value;
            const btn = document.getElementById('btnSubmitRequest');

            if (!alasan || alasan.trim().length < 10) {
                return alert('Tuliskan alasan valid minimal 10 karakter!');
            }

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            fetch('/api/user/request-role', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roleRequested, alasan })
            })
            .then(res => res.json())
            .then(res => {
                alert(res.message);
                if (res.success) {
                    window.location.href = '/dashboard';
                } else {
                    btn.disabled = false;
                    btn.innerText = "Ajukan Pengajuan Ke Owner";
                }
            })
            .catch(() => {
                alert('Gagal memproses pengajuan jaringan.');
                btn.disabled = false;
                btn.innerText = "Ajukan Pengajuan Ke Owner";
            });
        }
    </script>
</body>
</html>
