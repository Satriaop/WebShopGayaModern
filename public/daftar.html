<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Akun - {{config.webName}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&family=Fira+Code:wght=400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f1015;
        }
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-between selection:bg-red-500 selection:text-white px-4 py-6">

    <main class="w-full max-w-md mx-auto my-auto bg-[#14151f] border border-zinc-800/80 p-5 sm:p-6 rounded-2xl shadow-2xl space-y-4">
        <div>
            <h1 class="text-lg font-black tracking-wider text-red-500 uppercase">DAFTAR MEMBER</h1>
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-wider mt-0.5">lengkapi formulir di bawah ini dengan benar</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 px-1">username :</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-user absolute left-4 text-zinc-600 text-xs"></i>
                    <input type="text" id="username" required placeholder="masukkan username" class="w-full bg-[#0f1015] border border-zinc-800/80 focus:border-red-500/30 rounded-xl pl-11 pr-4 py-3 text-xs font-bold text-white placeholder-zinc-600 outline-none transition tracking-wide">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 px-1">password :</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-lock absolute left-4 text-zinc-600 text-xs"></i>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-[#0f1015] border border-zinc-800/80 focus:border-red-500/30 rounded-xl pl-11 pr-4 py-3 text-xs font-bold text-white placeholder-zinc-600 outline-none transition tracking-wide">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 px-1">email aktif :</label>
                <div class="flex gap-2">
                    <div class="relative flex items-center flex-grow">
                        <i class="fa-solid fa-envelope absolute left-4 text-zinc-600 text-xs"></i>
                        <input type="email" id="email" required placeholder="emailpembeli@gmail.com" class="w-full bg-[#0f1015] border border-zinc-800/80 focus:border-red-500/30 rounded-xl pl-11 pr-4 py-3 text-xs font-bold text-white placeholder-zinc-600 outline-none transition tracking-wide">
                    </div>
                    <button type="button" id="btnSendOtp" onclick="sendOtpCode()" class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-red-500 font-extrabold text-[10px] px-4 rounded-xl transition uppercase tracking-wider shadow-md active:scale-95 whitespace-nowrap">
                        kirim otp
                    </button>
                </div>
            </div>

            <div id="otpInputContainer" class="space-y-1.5 hidden">
                <label class="text-[10px] font-bold uppercase tracking-wider text-emerald-500 px-1 flex items-center gap-1.5">
                    <i class="fa-solid fa-shield-halved"></i> masukkan kode otp email :
                </label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-key absolute left-4 text-zinc-600 text-xs"></i>
                    <input type="text" id="otpCode" placeholder="contoh: 582910" class="w-full bg-[#0f1015] border border-emerald-500/20 focus:border-emerald-500/40 rounded-xl pl-11 pr-4 py-3 text-xs font-mono font-bold text-emerald-400 placeholder-zinc-700 outline-none transition tracking-widest">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 px-1">nomor handphone :</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-phone absolute left-4 text-zinc-600 text-xs"></i>
                    <input type="tel" id="nomorHp" required placeholder="08xxxxxxxxxx" class="w-full bg-[#0f1015] border border-zinc-800/80 focus:border-red-500/30 rounded-xl pl-11 pr-4 py-3 text-xs font-mono font-bold text-white placeholder-zinc-600 outline-none transition tracking-wide">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold uppercase tracking-wider text-zinc-500 px-1 flex justify-between items-center">
                    <span>api key personal :</span>
                    <span class="text-[9px] font-black text-red-400 bg-red-500/10 px-2 py-0.5 rounded border border-red-500/10 uppercase tracking-widest">lock generated</span>
                </label>
                <input type="text" id="apiKey" readonly class="w-full bg-[#0a0b0e] border border-zinc-900/50 text-zinc-600 font-mono rounded-xl px-4 py-3 text-xs outline-none cursor-not-allowed tracking-wider">
            </div>

            <div id="statusMsg" class="text-[11px] hidden text-center font-bold uppercase tracking-wide py-1 rounded-xl"></div>

            <div class="pt-2">
                <button type="submit" id="btnSubmit" class="w-full py-3.5 bg-red-600 hover:bg-red-700 text-white font-black text-xs tracking-widest rounded-xl transition uppercase shadow-lg shadow-red-600/10 active:scale-[0.99] flex justify-center items-center gap-2">
                    <span>buat akun baru</span> <i class="fa-solid fa-arrow-right text-xs"></i>
                </button>
            </div>
        </form>

        <div class="text-center text-xs text-zinc-500 border-t border-zinc-900 pt-4">
            sudah memiliki akun? <a href="/login" class="text-red-500 font-bold hover:underline ml-1">login disini</a>
        </div>
    </main>

    <script>
        function generateApiKey() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 5; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return `apky-${result}`;
        }

        document.getElementById('apiKey').value = generateApiKey();

        function sendOtpCode() {
            const email = document.getElementById('email').value.trim();
            const btnSend = document.getElementById('btnSendOtp');
            const statusMsg = document.getElementById('statusMsg');

            if (!email || !email.includes('@')) {
                alert('silakan masukkan alamat email yang valid!');
                return;
            }

            btnSend.disabled = true;
            btnSend.innerText = 'mengirim...';

            fetch('/api/auth/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            })
            .then(res => res.json())
            .then(data => {
                statusMsg.classList.remove('hidden');
                if (data.success) {
                    statusMsg.className = "text-emerald-400 bg-emerald-500/5 border border-emerald-500/10 text-[11px] text-center font-bold p-2.5 rounded-xl";
                    statusMsg.innerText = 'kode otp sukses dikirim! silakan periksa kotak masuk/spam email kamu.';
                    document.getElementById('otpInputContainer').classList.remove('hidden');
                    
                    let countdown = 60;
                    const timer = setInterval(() => {
                        countdown--;
                        btnSend.innerText = `${countdown}s`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            btnSend.disabled = false;
                            btnSend.innerText = 'kirim otp';
                        }
                    }, 1000);
                } else {
                    statusMsg.className = "text-red-500 bg-red-500/5 border border-red-500/10 text-[11px] text-center font-bold p-2.5 rounded-xl";
                    statusMsg.innerText = data.message;
                    btnSend.disabled = false;
                    btnSend.innerText = 'kirim otp';
                }
            })
            .catch(() => {
                alert('gagal terhubung ke server untuk mengirim otp.');
                btnSend.disabled = false;
                btnSend.innerText = 'kirim otp';
            });
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const nomorHp = document.getElementById('nomorHp').value;
            const apiKey = document.getElementById('apiKey').value;
            const otpCode = document.getElementById('otpCode').value;
            const statusMsg = document.getElementById('statusMsg');
            const btnSubmit = document.getElementById('btnSubmit');

            if (document.getElementById('otpInputContainer').classList.contains('hidden')) {
                alert('kamu wajib menekan tombol kirim otp dan memverifikasi email terlebih dahulu!');
                return;
            }

            statusMsg.classList.add('hidden');
            btnSubmit.disabled = true;
            btnSubmit.innerText = 'memproses pendaftaran...';

            try {
                const response = await fetch('/api/auth/daftar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email, nomorHp, apiKey, otpCode })
                });

                const data = await response.json();
                statusMsg.classList.remove('hidden');
                
                if (data.success) {
                    statusMsg.className = "text-emerald-400 bg-emerald-500/5 border border-emerald-500/10 text-[11px] text-center font-bold p-2.5 rounded-xl";
                    statusMsg.innerText = data.message;
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    statusMsg.className = "text-red-500 bg-red-500/5 border border-red-500/10 text-[11px] text-center font-bold p-2.5 rounded-xl";
                    statusMsg.innerText = data.message;
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'buat akun baru';
                }
            } catch {
                alert('terjadi gangguan koneksi jaringan.');
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'buat akun baru';
            }
        });
    </script>
</body>
</html>
