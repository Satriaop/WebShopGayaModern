<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riwayat Pengajuan Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#0f1015] text-gray-200 min-h-screen w-full flex relative select-none">

    <div class="flex-grow flex flex-col min-h-screen w-full max-w-md mx-auto p-4 justify-center">
        
        <div class="bg-[#14151f]/80 border border-zinc-800/80 p-6 rounded-2xl shadow-xl space-y-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <a href="/dashboard" class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center border border-zinc-800 text-zinc-400 transition hover:text-white hover:bg-zinc-800">
                        <i class="fa-solid fa-arrow-left text-xs"></i>
                    </a>
                    <h4 class="text-white font-extrabold text-sm uppercase tracking-wider">Riwayat Jabatan</h4>
                </div>
                <span class="text-[10px] text-orange-400 font-bold bg-orange-500/10 px-2.5 py-1 rounded-md border border-orange-500/10 uppercase tracking-wide">Status</span>
            </div>

            <div id="loadingState" class="py-12 text-center space-y-2">
                <i class="fa-solid fa-circle-notch animate-spin text-orange-500 text-xl"></i>
                <p class="text-zinc-500 text-xs font-semibold uppercase tracking-wider">Memuat data pengajuan...</p>
            </div>

            <div id="emptyState" class="hidden py-12 text-center space-y-2">
                <i class="fa-solid fa-folder-open text-zinc-600 text-xl"></i>
                <p class="text-zinc-500 text-xs font-semibold uppercase tracking-wider">Belum ada riwayat pengajuan admin</p>
            </div>

            <div id="listRequestHistory" class="hidden space-y-3 max-h-[350px] overflow-y-auto pr-1"></div>

            <a href="/requestrole" class="w-full py-3 bg-zinc-900 hover:bg-zinc-800 text-zinc-300 font-bold rounded-xl text-xs transition flex items-center justify-center gap-2 uppercase tracking-wider border border-zinc-800 active:scale-[0.98]">
                <i class="fa-solid fa-plus text-[10px]"></i> Buat Pengajuan Baru
            </a>
        </div>
        
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const listHistory = document.getElementById('listRequestHistory');

            fetch('/api/owner/request-role/list')
                .then(res => res.json())
                .then(res => {
                    loadingState.classList.add('hidden');
                    
                    const dataRequest = Array.isArray(res) ? res : (res.data || []);
                    
                    if (dataRequest && dataRequest.length > 0) {
                        listHistory.classList.remove('hidden');
                        emptyState.classList.add('hidden');
                        
                        listHistory.innerHTML = dataRequest.reverse().map(req => {
                            let statusBadge = '';
                            const currentStatus = (req.status || 'PENDING').toUpperCase();

                            if (currentStatus === 'SUCCESS' || currentStatus === 'APPROVED') {
                                statusBadge = '<span class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded font-black tracking-wider uppercase">SUCCESS</span>';
                            } else if (currentStatus === 'REJECTED' || currentStatus === 'FAILED') {
                                statusBadge = '<span class="text-[9px] bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded font-black tracking-wider uppercase">REJECTED</span>';
                            } else {
                                statusBadge = '<span class="text-[9px] bg-orange-500/10 text-orange-400 border border-orange-500/20 px-2 py-0.5 rounded font-black tracking-wider uppercase animate-pulse">PENDING</span>';
                            }

                            return `
                                <div class="bg-[#0f1015] border border-zinc-800/60 p-4 rounded-xl flex flex-col gap-2.5">
                                    <div class="flex justify-between items-center">
                                        <div class="flex flex-col text-left">
                                            <span class="text-white font-black text-xs uppercase tracking-wide">USER: ${req.username || '-'}</span>
                                            <span class="text-[10px] text-red-400 font-bold uppercase tracking-wide mt-0.5">ROLE: ${req.roleRequested || 'ADMIN'}</span>
                                            <span class="text-[9px] text-zinc-500 font-medium mt-0.5">${req.date || '-'}</span>
                                        </div>
                                        ${statusBadge}
                                    </div>
                                    <div class="bg-[#14151f] border border-zinc-900 px-3 py-2 rounded-lg text-left">
                                        <p class="text-[10px] text-zinc-400 font-semibold leading-relaxed break-words">${req.alasan || '-'}</p>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        emptyState.classList.remove('hidden');
                        listHistory.classList.add('hidden');
                    }
                })
                .catch(() => {
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    listHistory.classList.add('hidden');
                });
        });
    </script>
</body>
</html>
