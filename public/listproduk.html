<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katalog Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&family=Fira+Code:wght=400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f1015;
        }
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
    </style>
</head>
<body class="text-zinc-200 min-h-screen w-full pb-12 select-none bg-[#0f1015]">

    <header class="w-full bg-[#14151f]/80 border-b border-zinc-800/60 px-4 sm:px-6 py-4 flex items-center justify-between sticky top-0 backdrop-blur-md z-50">
        <div class="flex items-center space-x-3">
            <a href="/dashboard" class="w-9 h-9 rounded-xl bg-zinc-900 flex items-center justify-center border border-zinc-800 text-zinc-400 hover:text-white transition active:scale-95">
                <i class="fa-solid fa-arrow-left text-xs"></i>
            </a>
            <div>
                <h1 class="text-xs font-black tracking-widest text-white uppercase">MARKETPRODUK</h1>
                <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Katalog Digital Premium</p>
            </div>
        </div>
        <div class="flex items-center bg-zinc-900/80 border border-zinc-800 px-3 py-1.5 rounded-xl shadow-inner">
            <i class="fa-solid fa-box-open text-red-500 text-[10px] mr-2"></i>
            <span id="totalProductBadge" class="text-[10px] font-mono font-bold text-zinc-300">0 Items</span>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto p-4 sm:p-6 space-y-6 flex flex-col min-h-[calc(100vh-80px)]">

        <div class="relative w-full shadow-xl shrink-0">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <i class="fa-solid fa-magnifying-glass text-zinc-500 text-sm"></i>
            </span>
            <input type="text" id="searchInput" oninput="filterProducts()" placeholder="Cari nama akun, aplikasi streaming..." class="w-full bg-[#14151f] text-xs font-bold text-white placeholder-zinc-600 pl-11 pr-4 py-4 rounded-2xl border border-zinc-800/80 focus:outline-none focus:border-red-500/50 transition-all duration-300 shadow-inner">
        </div>

        <div class="flex items-center gap-2.5 overflow-x-auto pb-2 w-full shrink-0" id="categoryContainer">
            <button onclick="selectCategory('ALL')" class="category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-red-600/10 border-red-500 text-red-500 shadow-md shadow-red-500/5">
                <i class="fa-solid fa-layer-group mr-1.5"></i>Semua Produk
            </button>
            <button onclick="selectCategory('AKUN PREMIUM')" class="category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-white">
                <i class="fa-solid fa-user-shield mr-1.5"></i>Akun Premium
            </button>
            <button onclick="selectCategory('APLIKASI STREAMING')" class="category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-white">
                <i class="fa-solid fa-play mr-1.5"></i>App Streaming
            </button>
            <button onclick="selectCategory('AKUN GAME')" class="category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-white">
                <i class="fa-solid fa-gamepad mr-1.5"></i>Akun Game
            </button>
            <button onclick="selectCategory('LAIN NYA')" class="category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-white">
                <i class="fa-solid fa-cubes mr-1.5"></i>Lainnya
            </button>
        </div>

        <div id="loadingState" class="flex flex-col items-center justify-center py-24 bg-[#14151f]/40 border border-zinc-800/60 rounded-3xl w-full my-auto shadow-xl">
            <div class="animate-spin rounded-full h-8 w-8 border-2 border-red-600 border-t-transparent mb-4"></div>
            <p class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase">Sinkronisasi Katalog Database...</p>
        </div>

        <div id="emptyState" class="hidden flex flex-col items-center justify-center text-center bg-[#14151f]/60 border border-zinc-800/80 rounded-3xl p-8 w-full my-auto min-h-[300px] shadow-2xl">
            <div class="w-16 h-16 bg-[#0f1015] rounded-2xl flex items-center justify-center text-zinc-600 border border-zinc-800 mb-4 shadow-inner">
                <i class="fa-solid fa-box-open text-2xl text-zinc-600"></i>
            </div>
            <h3 class="text-xs font-black text-white uppercase tracking-widest">Data Tidak Ditemukan</h3>
            <p class="text-[10px] text-zinc-500 max-w-xs mt-2 font-bold tracking-wide">Item atau kategori yang kamu cari saat ini sedang tidak tersedia di sistem.</p>
        </div>

        <div id="productGrid" class="hidden grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4 w-full"></div>

    </main>

    <script>
        let allProducts = [];
        let currentCategory = 'ALL';

        async function fetchProducts() {
            try {
                const response = await fetch('/api/products');
                const result = await response.json();

                document.getElementById('loadingState').classList.add('hidden');

                if (result.success && result.data.length > 0) {
                    allProducts = result.data;
                    document.getElementById('totalProductBadge').innerText = `${allProducts.length} Items`;
                    renderProducts(allProducts);
                    document.getElementById('productGrid').classList.remove('hidden');
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                    document.getElementById('emptyState').classList.add('flex');
                }
            } catch (error) {
                console.error(error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="text-center text-red-500/80 p-8">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Gagal Terhubung Ke Server API</p>
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productGrid');
            container.innerHTML = '';

            products.forEach(product => {
                let totalStok = 0;
                let hargaTerkecil = Infinity;

                if (product.items && Array.isArray(product.items) && product.items.length > 0) {
                    product.items.forEach(item => {
                        totalStok += parseInt(item.stok || 0);
                        let itemHarga = parseInt(item.harga || 0);
                        if (itemHarga < hargaTerkecil) {
                            hargaTerkecil = itemHarga;
                        }
                    });
                }
                if (hargaTerkecil === Infinity) hargaTerkecil = 0;

                let ratingHtml = '';
                const currentRating = product.ratingDecimal || product.rating;
                if (currentRating && parseFloat(currentRating) > 0) {
                    ratingHtml = `
                        <div class="flex items-center gap-1 text-[9px] font-black text-amber-400 bg-amber-500/10 border border-amber-500/20 px-2 py-0.5 rounded-lg uppercase tracking-wider shrink-0 ml-auto">
                            <i class="fa-solid fa-star text-[8px]"></i>
                            <span>${parseFloat(currentRating).toFixed(1)}</span>
                        </div>
                    `;
                }

                const imageUrl = product.imageUrl || 'https://via.placeholder.com/300x400?text=No+Image';

                const card = document.createElement('div');
                card.className = "bg-[#14151f] rounded-2xl border border-zinc-800/80 overflow-hidden hover:border-red-500/50 transition-all duration-300 cursor-pointer flex flex-col group transform hover:-translate-y-1 shadow-xl hover:shadow-red-600/10 w-full h-full";
                card.setAttribute('onclick', `goToDetail('${product.productId || product.id}')`);

                card.innerHTML = `
                    <div class="w-full flex flex-col h-full">
                        
                        <div class="relative w-full aspect-[4/5] bg-zinc-950 overflow-hidden border-b border-zinc-900/60 shrink-0 flex items-center justify-center">
                            
                            <div class="absolute inset-0 bg-cover bg-center opacity-10 blur-xl scale-125 group-hover:opacity-30 transition-opacity duration-500" style="background-image: url('${imageUrl}');"></div>
                            
                            <img src="${imageUrl}" alt="${product.productName}" class="w-full h-full object-contain relative z-10 p-3 group-hover:scale-110 transition-transform duration-500">
                            
                            <div class="absolute top-3 left-3 bg-black/80 backdrop-blur-md px-2.5 py-1 rounded-lg border border-zinc-800 text-[8px] font-black tracking-widest text-red-500 uppercase z-20 shadow-lg">
                                ${product.category || 'DIGITAL'}
                            </div>
                        </div>
                        
                        <div class="p-4 space-y-3 w-full flex-grow flex flex-col justify-between">
                            <div class="space-y-2">
                                <div class="flex items-center justify-between gap-2 w-full">
                                    <div class="flex items-center gap-1.5 text-[8px] font-extrabold text-zinc-400 bg-zinc-900/80 border border-zinc-800/80 px-2 py-1 rounded-lg uppercase tracking-wider min-w-0 flex-grow truncate">
                                        <i class="fa-solid fa-store text-red-500 shrink-0"></i>
                                        <span class="truncate text-zinc-300">${product.merchantName || 'DIKA MARKET'}</span>
                                    </div>
                                    ${ratingHtml}
                                </div>
                                <h2 class="text-[11px] sm:text-xs font-black text-white line-clamp-2 group-hover:text-red-400 transition-colors duration-300 tracking-wide uppercase break-words leading-snug">${product.productName}</h2>
                            </div>

                            <div class="pt-3 border-t border-zinc-900/80 mt-auto">
                                <div class="flex flex-col gap-1 w-full">
                                    <div>
                                        <p class="text-[8px] text-zinc-500 uppercase font-bold tracking-widest mb-0.5">Mulai Dari</p>
                                        <p class="text-sm font-black text-red-500 tracking-wide font-mono">Rp ${hargaTerkecil.toLocaleString('id-ID')}</p>
                                    </div>
                                    <div class="text-left shrink-0 mt-1">
                                        <span class="inline-flex items-center gap-1.5 text-[8px] ${totalStok > 0 ? 'text-emerald-400 bg-emerald-500/5 border border-emerald-500/10' : 'text-red-400 bg-red-500/5 border border-red-500/10'} px-2.5 py-1 rounded-lg font-black uppercase tracking-wider w-fit">
                                            <span class="w-1.5 h-1.5 rounded-full ${totalStok > 0 ? 'bg-emerald-400 animate-pulse' : 'bg-red-500'}"></span>
                                            ${totalStok > 0 ? `STOK: ${totalStok}` : 'OUT OF STOCK'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectCategory(category) {
            currentCategory = category;
            
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                btn.className = "category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-white";
            });

            const activeBtn = event.currentTarget;
            activeBtn.className = "category-btn shrink-0 px-4 py-2.5 rounded-xl text-[10px] font-black tracking-widest uppercase border transition active:scale-95 bg-red-600/10 border-red-500 text-red-500 shadow-md shadow-red-500/5";

            filterProducts();
        }

        function filterProducts() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allProducts.filter(p => {
                const nameMatch = p.productName ? p.productName.toLowerCase().includes(keyword) : false;
                const merchantMatch = p.merchantName ? p.merchantName.toLowerCase().includes(keyword) : false;
                
                const categoryMatch = (currentCategory === 'ALL') || (p.category && p.category.toUpperCase() === currentCategory.toUpperCase());
                
                return (nameMatch || merchantMatch) && categoryMatch;
            });

            const grid = document.getElementById('productGrid');
            const empty = document.getElementById('emptyState');

            if (filtered.length > 0) {
                renderProducts(filtered);
                grid.classList.remove('hidden');
                empty.classList.add('hidden');
                empty.classList.remove('flex');
            } else {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                empty.classList.add('flex');
            }
        }

        function goToDetail(productId) {
            window.location.href = `detailproduk.html?id=${productId}`;
        }

        document.addEventListener('DOMContentLoaded', fetchProducts);
    </script>
</body>
</html>
